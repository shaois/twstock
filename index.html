<title>台股中長期選股儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;--accent:#00d4aa;--accent2:#3b82f6;--warn:#f59e0b;--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,#0d1b2e,#0a0e1a);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.api-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;width:220px;}
.api-input:focus{outline:none;border-color:var(--accent);}
.api-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;}
.api-select:focus{outline:none;border-color:var(--accent);}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all .15s;}
.btn-primary{background:var(--accent);color:#000;}.btn-primary:hover{background:#00bfa0;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-gold{background:var(--warn);color:#000;font-weight:700;}.btn-gold:hover{background:#eab308;transform:scale(1.02);}
.layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 57px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:8px 16px 4px;}
.filter-wrap{padding:4px 12px 8px;}
.filter-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;}
.stock-item{padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent;transition:all .12s;}
.stock-item:hover{background:var(--surface2);}.stock-item.active{background:rgba(0,212,170,.08);border-left-color:var(--accent);}
.s-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent2);}
.s-name{font-size:11px;color:var(--muted);}
.grade-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.gAp{background:rgba(0,255,204,.25);color:#00ffcc;}.gA{background:rgba(34,197,94,.2);color:#22c55e;}
.gB{background:rgba(0,212,170,.2);color:var(--accent);}.gC{background:rgba(245,158,11,.2);color:var(--warn);}
.gD{background:rgba(239,68,68,.2);color:var(--red);}
.main{overflow-y:auto;padding:20px;background:var(--bg);}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:14px;color:var(--muted);}
.welcome h2{font-size:20px;color:var(--text);font-weight:500;}
.step-cards{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;width:150px;text-align:center;}
.step-num{font-size:26px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.step-text{font-size:11px;line-height:1.6;}
#progressBar{position:fixed;top:57px;left:0;right:0;z-index:200;background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 18px;display:none;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
#progressBar.show{display:flex;}
.stock-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.stock-title h1{font-size:24px;font-weight:700;}
.stock-title .sub{color:var(--muted);font-size:13px;margin-top:2px;}
.score-overview{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.score-card .val{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;}
.score-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.panel-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.metric-row:last-child{border-bottom:none;}
.metric-name{color:var(--muted);font-size:12px;}
.metric-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.metric-score{font-size:10px;padding:1px 5px;background:rgba(0,212,170,.15);color:var(--accent);border-radius:3px;margin-left:5px;}
.bar-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.bar-label{width:90px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;}
.bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-val{width:28px;text-align:right;font-size:11px;font-family:'JetBrains Mono',monospace;}
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;}
.ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ai-badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 7px;background:rgba(59,130,246,.2);color:var(--accent2);border-radius:4px;}
.ai-content{line-height:1.9;color:var(--text);font-size:13px;white-space:pre-wrap;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:10px 0;}
.spinner{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.inst-card{background:var(--surface2);border-radius:8px;padding:10px;text-align:center;}
.inst-lbl{font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.inst-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;}
.screener-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--surface2);}
tbody td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);}
.td-mono{font-family:'JetBrains Mono',monospace;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;display:none;align-items:center;gap:8px;z-index:999;}
.toast.show{display:flex;}
@media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.score-overview{grid-template-columns:repeat(2,1fr);}.detail-grid{grid-template-columns:1fr;}}
</style>
</head>

function calcRSI(closes,p=14){if(closes.length<p+1)return 50;let gains=[],losses=[];for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1];gains.push(Math.max(d,0));losses.push(Math.max(-d,0));}const ag=gains.slice(-p).reduce((a,b)=>a+b)/p;const al=losses.slice(-p).reduce((a,b)=>a+b)/p;if(al===0)return 100;return 100-(100/(1+ag/al));}
function calcEMA(data,p){const k=2/(p+1);let ema=[data[0]];for(let i=1;i<data.length;i++)ema.push(data[i]*k+ema[i-1]*(1-k));return ema;}
function calcMACD(closes){if(closes.length<26)return{macd:0,hist:0};const e12=calcEMA(closes,12),e26=calcEMA(closes,26);const ml=e12.map((v,i)=>v-e26[i]);const sig=calcEMA(ml,9);return{macd:ml[ml.length-1],hist:ml[ml.length-1]-sig[sig.length-1]};}
function avg(arr,n){const a=arr.slice(-n);return a.reduce((s,v)=>s+v,0)/a.length;}

function calcRoeFromCache(fRows, balanceRows){
  if(!fRows?.length || !balanceRows?.length) return 0;
  const incomeRows = fRows
    .filter(r=>r.type==='IncomeAfterTaxes' && Number(r.value))
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,4);
  const equityRows = balanceRows
    .filter(r=>{
      const type = String(r.type || '');
      return Number(r.value) && (
        type === 'EquityAttributableToOwnersOfParent' ||
        type === 'TotalEquity' ||
        type === 'Equity'
      );
    })
    .sort((a,b)=>b.date.localeCompare(a.date));
  if(!incomeRows.length || !equityRows.length) return 0;
  const annualIncome = incomeRows.reduce((sum,row)=>sum + Number(row.value || 0), 0);
  const equity = Math.abs(Number(equityRows[0].value || 0));
  if(equity <= 0) return 0;
  return Math.round((annualIncome / equity) * 10000) / 100;
}

function daysToExDiv(stockId){
  const ex = ghCache?.exdiv?.[stockId]; if(!ex) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exDate = new Date(ex.date);
  return Math.round((exDate - today) / (1000*60*60*24));
}

function getExDivWarning(stockId){
  const ex = ghCache?.exdiv?.[stockId]; if(!ex) return null;
  const days = daysToExDiv(stockId); if(days === null || days < -30) return null;
  if(days < 0) return {text:`已除息 ${ex.div}元（${ex.date}）`, color:'#64748b', icon:'✓'};
  if(days === 0) return {text:`⚠️ 今日除息 ${ex.div}元`, color:'#ef4444', icon:'🔴'};
  if(days <= 7) return {text:`⚠️ ${days}天後除息 ${ex.div}元（${ex.date}）`, color:'#ef4444', icon:'🔴'};
  if(days <= 30) return {text:`📅 ${days}天後除息 ${ex.div}元（${ex.date}）`, color:'#f59e0b', icon:'🟡'};
  return null;
}

  if(ghCache.loaded) return ghCache;
  try{
    const nocache = `?t=${Date.now()}`;
    const [f,r,p,ex,b,scores,news,institutional] = await Promise.all([
      fetch(`${GH_CACHE_BASE}/fundamental.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/revenue.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/price.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/exdiv.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/balance.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/scores.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/news.json${nocache}`).then(x=>x.ok?x.json():{}),
      fetch(`${GH_CACHE_BASE}/institutional.json${nocache}`).then(x=>x.ok?x.json():{}),
    ]);
    ghCache.fundamental = f?.data || {};
    ghCache.revenue = r?.data || {};
    ghCache.price = p?.data || {};
    ghCache.exdiv = ex?.data || {};
    ghCache.balance = b?.data || {};
    ghCache.scores = scores?.data || {};
    ghCache.news = news?.data || {};
    ghCache.institutional = institutional?.data || {};
    ghCache.loaded = true;
    console.log("[GH Cache] 成功載入，檔案庫數量:", Object.keys(ghCache.price).length);
  }catch(e){ 
    ghCache.loaded = true; 
    console.log("[GH Cache] 載入異常。");
  }
  return ghCache;
}

function extractDataFromCache(stockId) {
    let result = {
        hasData: false, price: 0, high52: 0, low52: 0, closes: [], volumes: [],
        eps: 0, roe: 0, yoy: 0, rev_slope: 1.0, div: 0
    };

    const priceRows = ghCache.price[stockId];
    if (priceRows && priceRows.length > 0) {
        const sorted = priceRows.filter(x=>x.close!=null).sort((a,b)=>a.date.localeCompare(b.date));
        if (sorted.length > 0) {
            result.closes = sorted.map(x=>x.close);
            result.volumes = sorted.map(x=>x.Trading_Volume||0);
            result.price = result.closes[result.closes.length-1];
            result.high52 = Math.max(...result.closes);
            result.low52 = Math.min(...result.closes);
            result.hasData = true;
        }
    }

    const fRows = ghCache.fundamental[stockId];
    if (fRows && fRows.length > 0) {
        const epsRows = fRows.filter(r=>r.type==='EPS').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
        if(epsRows.length>0) result.eps = Math.round(epsRows.reduce((s,r)=>s+(r.value||0),0)*100)/100;
        
        const roeRow = fRows.filter(r=>r.type==='ReturnOnEquityAfterTax').sort((a,b)=>b.date.localeCompare(a.date))[0];
        if(roeRow) { let rv = roeRow.value||0; if(Math.abs(rv)<2&&rv!==0)rv*=100; result.roe=Math.round(rv*100)/100; }
        if(result.roe === 0) result.roe = calcRoeFromCache(fRows, ghCache.balance[stockId]);
        
        const divRow = fRows.filter(r=>r.type==='CashDividendReceivedPerShare').sort((a,b)=>b.date.localeCompare(a.date))[0];
        if(divRow) result.div = divRow.value||0;
    }

    const exDiv = ghCache.exdiv[stockId];
    if (result.div === 0 && exDiv && exDiv.div) {
        result.div = exDiv.div;
    }

    const rRows = ghCache.revenue[stockId];
    if (rRows && rRows.length > 0) {
        const revs = rRows.sort((a,b)=>b.date.localeCompare(a.date));
        if(revs.length >= 13){
            const tm=revs[0].revenue||0, ly=revs[12].revenue||0;
            result.yoy = ly>0 ? Math.round((tm-ly)/ly*1000)/10 : 0;
            const m3=revs.slice(0,3).reduce((s,r)=>s+(r.revenue||0),0)/3;
            const m12=revs.slice(0,12).reduce((s,r)=>s+(r.revenue||0),0)/12;
            result.rev_slope = m12>0 ? m3/m12 : 1.0;
        }
    }

    const fb = FALLBACK[stockId];
    if (fb) {
        if (result.eps === 0) result.eps = fb.eps;
        if (result.roe === 0) result.roe = fb.roe;
        if (result.div === 0) result.div = fb.div;
        if (result.yoy === 0 && fb.yoy) result.yoy = fb.yoy;
    }
    
    return result;
}

function scoreStock(id, cData, stockInfo){
  if(!cData.hasData) return null; 

  const sector = stockInfo.sector;
  const closes = cData.closes; const volumes = cData.volumes;
  const price = cData.price;
  
  let t={price, high52:cData.high52, low52:cData.low52, ma5:0, ma20:0, ma60:0, ma120:0, rsi:50, macd:0, macdHist:0, volRatio:1, trend6m:0, pos52:50};
  if(closes.length>=5){
    t.ma5=avg(closes,5);t.ma20=avg(closes,Math.min(20,closes.length));
    t.ma60=avg(closes,Math.min(60,closes.length));t.ma120=avg(closes,Math.min(120,closes.length));
    t.rsi=calcRSI(closes);const m=calcMACD(closes);t.macd=m.macd;t.macdHist=m.hist;
    const v5=avg(volumes,Math.min(5,volumes.length)),v20=avg(volumes,Math.min(20,volumes.length));
    t.volRatio=v20>0?v5/v20:1;
    t.pos52=t.high52!==t.low52?(t.price-t.low52)/(t.high52-t.low52)*100:50;
    if(closes.length>=120)t.trend6m=(t.price-closes[closes.length-121])/closes[closes.length-121]*100;
  }

  let fScore=0, fDetail={};
  const epsS = cData.eps >= 5 ? 5 : (cData.eps > 0 ? 3 : 0); fScore += epsS; fDetail.eps = epsS;
  const roeS = cData.roe >= 20 ? 20 : (cData.roe >= 15 ? 15 : (cData.roe >= 10 ? 10 : (cData.roe >= 5 ? 5 : 0))); fScore += roeS; fDetail.roe = roeS;
  const yoyS = cData.yoy >= 20 ? 15 : (cData.yoy >= 10 ? 10 : (cData.yoy >= 0 ? 5 : 0)); fScore += yoyS; fDetail.yoy = yoyS;
  const slopeS = cData.rev_slope >= 1.1 ? 10 : (cData.rev_slope >= 1.02 ? 7 : (cData.rev_slope >= 0.95 ? 3 : 0)); fScore += slopeS; fDetail.slope = slopeS;

  let tScore=0, tDetail={};
  let maS = 10;
  if(t.ma5 && t.ma20 && t.ma60) {
      if (t.ma5 > t.ma20 && t.ma20 > t.ma60) maS = 20;
      else if (t.ma20 > t.ma60) maS = 12;
      else if (t.ma5 > t.ma20) maS = 8;
      else maS = 2;
  }
  tScore += maS; tDetail.ma = maS;
  const rsi = t.rsi; let rsiS = 0;
  if (rsi >= 50 && rsi <= 70) rsiS = 10; else if (rsi > 70) rsiS = 8; else if (rsi >= 40 && rsi < 50) rsiS = 5; else if (rsi >= 30 && rsi < 40) rsiS = 3; else rsiS = 0;
  tScore += rsiS; tDetail.rsi = rsiS;
  let macdS = t.macdHist > 0 ? 8 : (t.macdHist === 0 ? 4 : 1); tScore += macdS; tDetail.macd = macdS;
  let volS = (t.volRatio >= 1.2 && t.volRatio <= 2.5) ? 7 : ((t.volRatio >= 0.8 && t.volRatio < 1.2) ? 5 : (t.volRatio > 2.5 ? 3 : 1)); tScore += volS; tDetail.vol = volS;
  let pos = t.pos52; let trendS = (pos >= 60 && pos <= 85) ? 5 : ((pos >= 40 && pos < 60) ? 3 : (pos > 85 ? 2 : 0)); tScore += trendS; tDetail.trend = trendS;
  tDetail.trendHot = t.trend6m >= 50;

  let vScore=0, vDetail={};
  const pe = t.price > 0 && cData.eps > 0 ? t.price / cData.eps : null;
  const divYield = t.price > 0 && cData.div > 0 ? (cData.div / t.price * 100) : 0;
  let base_pe = SECTOR_PE[sector] || 18; if (id === "2330") base_pe = 22; if (id === "2454") base_pe = 20;
  let pe_percentile = 50;
  if (pe !== null) {
      const low_pe = base_pe * 0.7; const high_pe = base_pe * 1.5;
      if (pe <= low_pe) pe_percentile = 10; else if (pe >= high_pe) pe_percentile = 95; else pe_percentile = ((pe - low_pe) / (high_pe - low_pe)) * 100;
  } else { pe_percentile = null; }
  
  const is_moat = (cData.roe >= 20.0 && cData.rev_slope >= 1.0);
  let peS = 0;
  if (pe === null) peS = 6;
  else if (is_moat) {
      if (pe_percentile <= 50) peS = 12; else if (pe_percentile <= 80) peS = 10; else if (pe_percentile <= 98) peS = 7; else peS = 4;
  } else {
      if (pe_percentile <= 25) peS = 12; else if (pe_percentile <= 55) peS = 10; else if (pe_percentile <= 75) peS = 7; else if (pe_percentile <= 90) peS = 4; else peS = 0; 
  }

  let dyS = 0;
  if (is_moat) {
      if (divYield >= 3.5) dyS = 8; else if (divYield >= 1.8) dyS = 6; else if (divYield >= 1.0) dyS = 4; else dyS = 2;
  } else {
      if (divYield >= 5.0) dyS = 8; else if (divYield >= 4.0) dyS = 6; else if (divYield >= 2.5) dyS = 3; else dyS = 0;
  }
  
  vScore = peS + dyS;
  vDetail = { pe, divYield, pe_percentile, peScore: peS, dyScore: dyS, is_moat, avgPE: base_pe };

  const total = Math.round((fScore+tScore+vScore)*10)/10;
  const grade = total >= 95 ? "A+" : total >= 80 ? "A" : total >= 65 ? "B" : total >= 50 ? "C" : "D";
  const suggestion = total >= 95 ? "強力買進" : total >= 80 ? "強烈建議關注" : total >= 65 ? "值得追蹤" : total >= 50 ? "中性觀望" : "暫不建議";
  
  const overheatWarning=t.trend6m>=50?{text:`⚠️ 半年漲幅達${t.trend6m.toFixed(0)}%，追高風險偏高`,color:'#f97316'}:null;
  const isCyclical = new Set(["航運","鋼鐵","石化","面板","水泥","紡織"]).has(sector);
  const cyclicalPeWarning=(isCyclical&&pe!==null&&pe<8)?{text:`⚠️ 循環股PE僅${pe.toFixed(1)}倍，可能為獲利高點，非真正低估`,color:'#f97316'}:null;
  const exDivWarning = getExDivWarning(id);

  return{id,name:stockInfo.name,sector,total,fScore,tScore,vScore,grade,suggestion,overheatWarning,cyclicalPeWarning,exDivWarning,isCyclical,f:cData,t,fDetail,tDetail,vDetail};
}

async function loadStocks(){
  const loadBtn = document.querySelector('.btn-primary');
  loadBtn.textContent = '讀取快取中...';
  loadBtn.style.opacity = '0.7';

  await loadGitHubCache();

  allStocks = [];
  allScores = {};

  for (const s of CANDIDATES) {
      if (ghCache.scores && ghCache.scores[s.id]) {
          allScores[s.id] = ghCache.scores[s.id];
      } else {
          if (!ghCache.price || !ghCache.price[s.id]) continue; 
          const cData = extractDataFromCache(s.id);
          if (!cData.hasData) continue;
          allScores[s.id] = scoreStock(s.id, cData, s);
      }
      allScores[s.id].id = s.id;
      allScores[s.id].name = s.name;
      allScores[s.id].sector = s.sector;
      allScores[s.id].newsData = ghCache.news?.[s.id] || null;
      allScores[s.id].instData = ghCache.institutional?.[s.id] || allScores[s.id].instData || null;
      const displayPrice = allScores[s.id]?.t?.price || 0;
      allStocks.push({
          ...s,
          price: displayPrice,
          marketCap: allScores[s.id]?.marketCap || displayPrice * (s.shares || 0) * 1000
      });
  }

  allStocks.sort((a, b) => b.marketCap - a.marketCap);

  document.getElementById('stockCount').textContent = `(${allStocks.length})`;
  showToast(`✓ 瞬間載入完畢！共 ${allStocks.length} 檔。`);
  renderStockList();
  
  loadBtn.textContent = '載入最新快取';
  loadBtn.style.opacity = '1';
}

async function loadLiveInst(id) {
    const box = document.getElementById('instLiveContent');
    const btn = document.getElementById('btnInstLive');
    btn.disabled = true;
    box.innerHTML = '<div class="spinner" style="margin-right:8px; display:inline-block; vertical-align:middle"></div> <span style="vertical-align:middle">正在連線交易所抓取最新籌碼...</span>';
    try {
        const start=new Date(Date.now()-30*24*60*60*1000).toISOString().slice(0,10);
        const r=await fetch(`${PROXY}/api/finmind/${id}?token=${FINMIND_TOKEN}&start_date=${start}`);
        if(!r.ok) throw new Error();
        const d=await r.json();
        if(d.status!==200||!d.data?.length) throw new Error();
        
        const allDates=[...new Set(d.data.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
        const latest=allDates[0]; const last5Dates=allDates.slice(0,5);
        function sumByDates(dates){
          const rows=d.data.filter(x=>dates.includes(x.date));
          let f=0,t=0,dealer=0;
          for(const row of rows){
            const net=(row.buy||0)-(row.sell||0); const n=row.name;
            if(n==='Foreign_Investor'||n==='Foreign_Dealer_Self')f+=net; else if(n==='Investment_Trust')t+=net; else if(n.includes('Dealer'))dealer+=net;
          }
          return {foreign:Math.round(f/1000),trust:Math.round(t/1000),dealer:Math.round(dealer/1000),total:Math.round((f+t+dealer)/1000)};
        }
        const todayData=sumByDates([latest]); const trend5d=sumByDates(last5Dates);
        let consecutiveBuyDays=0; for(const dt of last5Dates){if(sumByDates([dt]).total>0)consecutiveBuyDays++; else break;}
        let consecutiveSellDays=0; for(const dt of last5Dates){if(sumByDates([dt]).total<0)consecutiveSellDays++; else break;}
        
        allScores[id].instData = {...todayData, date:latest, total5d:trend5d.total, consecutiveBuyDays, consecutiveSellDays};
        const inst = allScores[id].instData;

        function colorNum(v){const color=v>0?'var(--green)':v<0?'var(--red)':'var(--muted)';const sign=v>0?'+':'';return`<span style="color:${color}">${sign}${v.toLocaleString()}</span>`;}
        
        let streakHtml = '';
        if(inst.consecutiveBuyDays>=3) streakHtml = `<span style="color:var(--green)">🔥 連續買超${inst.consecutiveBuyDays}日</span>`;
        else if(inst.consecutiveSellDays>=3) streakHtml = `<span style="color:var(--red)">⚠️ 連續賣超${inst.consecutiveSellDays}日</span>`;

        box.innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
            <div class="inst-card"><div class="inst-lbl">外資買賣超</div><div class="inst-val">${colorNum(inst.foreign)}</div><div style="font-size:9px;color:var(--muted)">張</div></div>
            <div class="inst-card"><div class="inst-lbl">投信買賣超</div><div class="inst-val">${colorNum(inst.trust)}</div><div style="font-size:9px;color:var(--muted)">張</div></div>
            <div class="inst-card"><div class="inst-lbl">自營商買賣超</div><div class="inst-val">${colorNum(inst.dealer)}</div><div style="font-size:9px;color:var(--muted)">張</div></div>
            <div class="inst-card"><div class="inst-lbl">三大法人合計</div><div class="inst-val">${colorNum(inst.total)}</div><div style="font-size:9px;color:var(--muted)">張</div></div>
          </div>
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px">
            <span style="color:var(--muted)">資料日期: ${inst.date} ｜ 近5日累計：<span style="font-weight:600">${colorNum(inst.total5d)}</span> 張</span>
            ${streakHtml}
          </div>
        `;
        btn.disabled = false;
    } catch(e) {
        box.innerHTML = '<span style="color:var(--red)">❌ 無法取得籌碼資料，可能是 API 額度用盡。</span>';
        btn.disabled = false;
    }
}

請用繁體中文輸出：

    let momentumScore = 0;
    let reasons = [];

    else { momentumScore += 10; reasons.push('RSI回升'); }
    if(macdHist > 0) { momentumScore += 20; reasons.push('MACD轉強'); }
    else if(macdHist > -0.5) { momentumScore += 8; reasons.push('MACD止跌'); }
    if(volRatio >= 1.5 && volRatio <= 3.5) { momentumScore += 20; reasons.push('量能放大'); }

async function runAI(id){

  panel.scrollIntoView({behavior:'smooth',block:'start'});

  const f = sc.f || {};
  const t = sc.t || {};
  const v = sc.vDetail || {};
  const rank = allStocks.findIndex(x => x.id === id) + 1;
  const missing = [];
  if(!f.div) missing.push('現金股利為 0 或缺資料');
  if(!f.roe) missing.push('ROE 為 0 或缺資料');
  if(!f.eps) missing.push('EPS 為 0 或缺資料');
  if(!v.pe) missing.push('PE 無法正常計算');
  if(!sc.instData) missing.push('三大法人資料未更新');

  const inst = sc.instData;
  const instText = inst
    ? `外資 ${inst.foreign} 張，投信 ${inst.trust} 張，自營商 ${inst.dealer} 張，三大法人合計 ${inst.total} 張，近 5 日合計 ${inst.total5d} 張，日期 ${inst.date}`
    : '三大法人資料缺漏';

  const prompt = `
你是台股投資分析助理。請只根據我提供的資料分析，不要保證獲利，不要編造新聞或財報。

股票：${id} ${sc.name}
產業：${sc.industry || '未知'}
目前系統排名：#${rank}
系統等級：${sc.grade}
總分：${sc.total}/120
基本面：${sc.fScore}/50
技術面：${sc.tScore}/50
估值面：${sc.vScore}/20

基本面資料：
- EPS：${f.eps ?? 'N/A'}
- ROE：${f.roe ?? 'N/A'}%
- 月營收年增率：${f.yoy ?? 'N/A'}%
- 營收動能斜率：${f.rev_slope ?? 'N/A'}x

技術面資料：
- 股價：${t.price ?? 'N/A'} 元
- 52 週高低：${t.high52 ?? 'N/A'} / ${t.low52 ?? 'N/A'}
- 52 週位置：${t.pos52 ?? 'N/A'}%

- RSI14：${t.rsi ?? 'N/A'}
- MACD Hist：${t.macdHist ?? 'N/A'}
- 量比：${t.volRatio ?? 'N/A'}x
- 6 個月漲跌幅：${t.trend6m ?? 'N/A'}%

估值資料：
- 本益比 PE：${v.pe ?? 'N/A'}x
- 產業平均 PE：${v.industry_pe ?? 'N/A'}x
- 歷史估值位置：${v.pe_percentile ?? 'N/A'}%
- 股息殖利率：${v.divYield ?? 'N/A'}%
- 是否護城河股：${v.is_moat ? '是' : '否'}

法人資料：
${instText}

資料警示：
${missing.length ? missing.map(x => `- ${x}`).join('\n') : '- 無明顯缺漏'}

請用繁體中文，分成以下 5 段，每段 2 到 4 句：

`;

  try{

      body:JSON.stringify({

          max_tokens:1200
        }

    let d;
    try{ d = await r.json(); }
    catch(_){ d = {error:{message:await r.text()}}; }

    if(!r.ok){
      const msg = d?.detail || d?.error?.message || `AI API 回傳 ${r.status}`;

    const answer = d?.choices?.[0]?.message?.content;

    content.innerHTML = `<span style="color:var(--red)">❌ ${msg}</span>`;
  }finally{
    clearTimeout(timer);
  }

function findMomentumTop5(){
  if(Object.keys(allScores).length===0){showToast('請先載入資料');return;}
  document.getElementById('welcome').style.display='none';
  document.getElementById('stockDetail').style.display='none';
  const container=document.getElementById('screenerResult');
  container.style.display='block';

  let candidates = Object.values(allScores).map(sc => {
    const t = sc.t || {};
    const f = sc.f || {};
    const v = sc.vDetail || {};
    const rsi = t.rsi ?? 50;
    const macdHist = t.macdHist ?? 0;
    const volRatio = t.volRatio ?? 1;
    const trend6m = t.trend6m ?? 0;
    const pos52 = t.pos52 ?? 50;
    const ma20 = t.ma20 ?? 0;
    const ma60 = t.ma60 ?? 0;
    const ma120 = t.ma120 ?? 0;
    const price = t.price ?? 0;
    const aboveMa20 = price > ma20;
    const maSupport = ma20 >= ma60 && ma60 >= ma120;
    const nearMa20 = ma20 > 0 ? Math.abs(price - ma20) / ma20 * 100 <= 8 : false;
    const rejects = [];

    if(sc.tScore < 38) rejects.push('技術分不足');
    if(rsi < 50 || rsi > 68) rejects.push('RSI不在進場區');
    if(macdHist <= 0) rejects.push('MACD未轉強');
    if(volRatio < 1.05 || volRatio > 2.4) rejects.push('量能不理想');
    if(trend6m < -5 || trend6m > 28) rejects.push('半年漲幅不適合');
    if(pos52 < 45 || pos52 > 78) rejects.push('位置不適合追');
    if(!aboveMa20 || !nearMa20) rejects.push('離MA20太遠或未站上');
    if(!maSupport) rejects.push('均線支撐不足');
    if(v.pe !== null && v.pe > 70 && sc.fScore < 30) rejects.push('估值過高');
    if(rejects.length) return null;

    let entryScore = 0;
    let reasons = [];
    if(rsi >= 54 && rsi <= 63) { entryScore += 25; reasons.push('RSI進場區'); }
    else { entryScore += 15; reasons.push('RSI偏強'); }
    if(macdHist > 0) { entryScore += 18; reasons.push('MACD轉強'); }
    if(volRatio >= 1.15 && volRatio <= 1.9) { entryScore += 18; reasons.push('量能溫和放大'); }
    else { entryScore += 10; reasons.push('量能可接受'); }
    if(pos52 >= 52 && pos52 <= 72) { entryScore += 16; reasons.push('位置未過熱'); }
    else { entryScore += 8; reasons.push('位置可觀察'); }
    if(trend6m >= 0 && trend6m <= 22) { entryScore += 13; reasons.push('漲幅可控'); }

    if(sc.fScore >= 30) reasons.push('基本面不弱');
    if((f.yoy ?? 0) > 0) reasons.push('營收正成長');

    return { ...sc, entryScore, reasons };
  }).filter(Boolean);

  candidates.sort((a,b) => b.entryScore - a.entryScore);

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

        這份清單不是找最會漲的股票，而是找「動能轉強、位置未過熱、靠近MA20、有短線進場條件」的候選股。已經離均線太遠、半年漲太多、RSI過熱的股票會被排除。

const _getPracticalTradeDecisionBeforePositionCap = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const d = _getPracticalTradeDecisionBeforePositionCap(sc, mode);
  const t = sc.t || {};
  const price = Number(t.price || 0);
  const high52 = Number(t.high52 || t.high_52w || 0);
  const low52 = Number(t.low52 || t.low_52w || 0);
  const pos52 = high52 > low52 && price ? ((price - low52) / (high52 - low52)) * 100 : Number(t.pos52 || 0);
  const volRatio = Number(t.volRatio || 1);
  const sixMonth = Number(t.return6m || t.sixMonthReturn || t.change6m || 0);
  const rsi = Number(t.rsi || 50);
  const ma20Gap = t.ma20 && price ? ((price - Number(t.ma20)) / Number(t.ma20)) * 100 : 0;
  const actionRank = {'不買':0,'觀望':1,'小量試單':2,'買進':3,'積極買進':4};
  const capTo = (action, position, reason) => {
    if(actionRank[d.action] > actionRank[action]){
      d.action = action;
      d.position = position;
      d.risks = Array.isArray(d.risks) ? d.risks : [];
      if(reason && !d.risks.includes(reason)) d.risks.unshift(reason);
    }
  };

  const rangeHighNoBreakout = pos52 >= 60 && volRatio < 1.3 && ma20Gap < 5;
  const stretchedButNotHot = pos52 >= 65 && sixMonth >= 8 && rsi >= 55 && rsi < 68;
  const overheat = pos52 >= 75 || ma20Gap >= 8 || rsi >= 68;

  if(mode === 'short'){
    if(overheat){
      capTo('小量試單', '20-30%', '短線位置偏高，避免重倉追高');
    }else if(rangeHighNoBreakout || stretchedButNotHot){
      capTo('小量試單', '20-30%', '高檔未放量突破，只適合小量試單');
    }
  }else{
    if(overheat){
      capTo('買進', '30-40%', '位置偏高，分批不重倉');
    }else if(rangeHighNoBreakout || stretchedButNotHot){
      capTo('買進', '40-50%', '接近區間高位，先分批不要積極重倉');
    }
  }

  d.summary = d.action === '積極買進'
    ? '高勝率且風險可控'
    : d.action === '買進'
      ? '條件可進場，但需分批控管'
      : d.action === '小量試單'
        ? '有機會但位置或風險未完全理想'
        : d.action === '觀望'
          ? '等待更好的價格或訊號'
          : '風險報酬不佳';
  return d;
};

function buildLocalAIConclusion(sc, mode='long', errorNote=''){
  const d = getPracticalTradeDecision(sc, mode);
  const t = sc.t || {};
  const price = Number(t.price || 0);
  const ma20 = Number(t.ma20 || 0);
  const high52 = Number(t.high52 || t.high_52w || 0);
  const targetLow = price ? Math.round(price * (mode === 'short' ? 1.03 : 1.04) * 10) / 10 : 0;
  const targetHighBase = high52 && high52 > price ? Math.min(high52, price * (mode === 'short' ? 1.08 : 1.12)) : price * (mode === 'short' ? 1.08 : 1.12);
  const targetHigh = price ? Math.round(targetHighBase * 10) / 10 : 0;
  const stopBase = ma20 ? Math.min(ma20 * 0.98, price * (mode === 'short' ? 0.96 : 0.94)) : price * (mode === 'short' ? 0.96 : 0.94);
  const stop = price ? Math.round(stopBase * 10) / 10 : 0;
  const reasons = (d.reasons || []).slice(0, 2).join('、') || '分數與趨勢尚可';
  const risks = (d.risks || []).slice(0, 2).join('、') || '注意大盤與量能變化';
  return [
    errorNote ? `AI API 暫時不穩，先用系統規則產生備用結論。` : '',
    `結論：${d.action}`,
    `建議部位：${d.position}`,
    `目標賣出區：${targetLow} ~ ${targetHigh} 元`,
    `停損價：${stop} 元`,
    `理由：${reasons}`,
    `提醒：${risks}`
  ].filter(Boolean).join('\n');
}

function buildCompactAIPrompt(id, sc, mode='long'){
  const d = getPracticalTradeDecision(sc, mode);
  const t = sc.t || {};
  const f = sc.f || {};

async function fetchAIWithRetry(endpoint, apiKey, model, prompt){
  const models = getAIProvider() === 'groq' && model !== 'llama-3.1-8b-instant'
    ? [model, 'llama-3.1-8b-instant']
    : [model, model];
  let lastError = null;
  for(let i=0;i<models.length;i++){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 110000);
    try{
      const r = await fetch(endpoint, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        signal:controller.signal,
        body:JSON.stringify({
          api_key:apiKey,
          body:{
            model:models[i],
            messages:[{role:'user', content:prompt}],
            temperature:0.05,
            max_tokens:260
          }
        })
      });
      let d;
      try{ d = await r.json(); }
      catch(_){ d = {error:{message:await r.text()}}; }
      if(!r.ok) throw new Error(d?.detail || d?.error?.message || `AI API ${r.status}`);
      const answer = d?.choices?.[0]?.message?.content;
      if(!answer) throw new Error(d?.error?.message || 'AI 沒有回傳內容');
      return answer;
    }catch(e){
      lastError = e;
      await new Promise(resolve => setTimeout(resolve, 800));
    }finally{
      clearTimeout(timer);
    }
  }
  throw lastError || new Error('AI 呼叫失敗');
}

      });
    }

      throw new Error(`有效評分數量不完整，目前 ${Object.keys(allScores).length} 筆，應有 ${expectedCount} 筆`);

    }

function getShortWeaknessContext(sc){
  const t = sc?.t || {};
  const n = (v, fallback=0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
  const price = n(t.price);
  const ma5 = n(t.ma5);
  const ma20 = n(t.ma20);
  const downStreak = n(t.downStreak ?? t.down_streak);
  const last3Return = n(t.last3Return ?? t.last_3_return);
  const ma5Gap = n(t.ma5Gap ?? t.ma5_gap, ma5 > 0 ? ((price - ma5) / ma5) * 100 : 0);
  const macdHist = n(t.macdHist ?? t.macd_hist);
  const macdHistDelta = n(t.macdHistDelta ?? t.macd_hist_delta);
  const volRatio = n(t.volRatio ?? t.vol_ratio_5_20, 1);
  const lastVolumeRatio20 = n(t.lastVolumeRatio20 ?? t.last_volume_ratio_20, volRatio);
  const rsi = n(t.rsi ?? t.rsi14, 50);
  const blockers = [];
  const cautions = [];

  if(downStreak >= 3) blockers.push('連跌3天');
  else if(downStreak >= 2) cautions.push('連跌2天');

  if(ma5 > 0 && price > 0 && price < ma5){
    if(downStreak >= 2 || ma5Gap <= -1) blockers.push('跌破MA5');
    else cautions.push('低於MA5');
  }
  if(ma20 > 0 && price > 0 && price < ma20 && downStreak >= 2) blockers.push('跌破MA20');

  if(macdHist <= 0 && downStreak >= 2) blockers.push('MACD轉弱');
  else if(macdHist > 0 && macdHistDelta < 0) cautions.push('MACD動能縮小');

  if(last3Return <= -3) blockers.push('3日跌幅過大');
  else if(last3Return < -1.5) cautions.push('3日轉弱');

  if((volRatio < 0.8 || lastVolumeRatio20 < 0.75) && downStreak >= 2) blockers.push('量縮下跌');
  else if(volRatio < 0.9 || lastVolumeRatio20 < 0.85) cautions.push('量能不足');

  if(rsi >= 70 && macdHistDelta < 0) cautions.push('RSI偏熱且動能降溫');

  return {
    blocker: blockers.length > 0,
    caution: cautions.length > 0,
    blockers,
    cautions,
    downStreak,
    last3Return,
    ma5Gap,
    macdHistDelta,
    volRatio,
    lastVolumeRatio20,
    label: blockers.length ? '短線轉弱' : (cautions.length ? '短線需確認' : '短線健康'),
    note: [...blockers, ...cautions].join('、') || '未出現明顯轉弱訊號'
  };
}

const _getPracticalTradeDecisionBeforeShortWeakness = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const decision = _getPracticalTradeDecisionBeforeShortWeakness(sc, mode);
  if(mode !== 'short') return decision;

  const weak = getShortWeaknessContext(sc);
  decision.contexts = decision.contexts || {};
  decision.contexts.shortWeakness = weak;
  decision.shortWeakness = weak;

  if(weak.blocker){
    decision.action = '不買';
    decision.position = '0%';
    decision.buyType = '轉弱排除';
    decision.risk = (decision.risk || 0) + 3;
    decision.risks = [...weak.blockers, ...(decision.risks || [])].slice(0, 5);
    decision.summary = `短線轉弱：${weak.note}，不列入短線買進`;
    return decision;
  }

  if(weak.caution){
    decision.risk = (decision.risk || 0) + 1;
    decision.risks = [...weak.cautions, ...(decision.risks || [])].slice(0, 5);
    if(String(decision.action).includes('積極') || decision.position === '60-70%'){
      decision.action = '小量試單';
      decision.position = '20-30%';
      decision.buyType = '等確認';
      decision.summary = `短線需確認：${weak.note}，只適合小量觀察`;
    }
  }
  return decision;
};

function _fmtPrice(v){
  if(!Number.isFinite(v) || v <= 0) return 'N/A';
  return v >= 100 ? v.toFixed(0) : v.toFixed(1);
}

function _targetZones(sc){
  const t = sc.t || {};
  const f = sc.f || {};
  const v = sc.vDetail || {};
  const price = Number(t.price || 0);
  const eps = Number(f.eps || 0);
  const industryPe = Number(v.industry_pe || 0);
  const ma20 = Number(t.ma20 || 0);
  const ma60 = Number(t.ma60 || 0);
  const ma120 = Number(t.ma120 || 0);
  const rsi = Number(t.rsi || 50);
  const shortUp = rsi >= 65 ? [1.03, 1.06] : [1.04, 1.09];
  let longLow = price * 1.12;
  let longHigh = price * 1.25;
  if(eps > 0 && industryPe > 0){
    longLow = eps * industryPe * 0.9;
    longHigh = eps * industryPe * 1.1;
    if(longHigh < price * 1.08){
      longLow = price * 1.08;
      longHigh = price * 1.18;
    }
  }
  const shortStopBase = ma20 > 0 ? Math.min(ma20 * 0.98, price * 0.94) : price * 0.94;
  const longStopBase = ma120 > 0 ? Math.min(ma120 * 0.97, price * 0.88) : price * 0.88;
  return {
    shortTarget: `${_fmtPrice(price * shortUp[0])} ~ ${_fmtPrice(price * shortUp[1])}`,
    shortStop: _fmtPrice(shortStopBase),
    longTarget: `${_fmtPrice(longLow)} ~ ${_fmtPrice(longHigh)}`,
    longStop: _fmtPrice(longStopBase),
    ma20: _fmtPrice(ma20),
    ma60: _fmtPrice(ma60),
    ma120: _fmtPrice(ma120)
  };
}

function getChipMood(sc){
  const inst = sc.instData || {};
  const today = Number(inst.total || 0);
  const five = Number(inst.total5d || 0);
  const trust = Number(inst.trust || 0);
  const foreign = Number(inst.foreign || 0);
  let score = 0;
  const reasons = [];
  if(today > 0){ score += 2; reasons.push('法人今日買超'); }
  if(five > 0){ score += 3; reasons.push('近5日偏買'); }
  if(trust > 0){ score += 2; reasons.push('投信買超'); }
  if(foreign > 0){ score += 1; reasons.push('外資買超'); }
  if(today < 0){ score -= 2; reasons.push('法人今日賣超'); }
  if(five < 0){ score -= 3; reasons.push('近5日偏賣'); }
  if(!sc.instData) reasons.push('籌碼待更新');
  const label = score >= 5 ? '偏多' : score >= 2 ? '小多' : score <= -4 ? '偏空' : score <= -1 ? '轉弱' : '中性';
  return { score, label, reasons: reasons.slice(0,3) };
}

function getMarketMood(){
  const rows = Object.values(allScores || {});
  if(!rows.length) return { label:'未知', score:0, note:'尚未載入市場資料' };
  const strong = rows.filter(sc => (sc.t?.rsi ?? 0) >= 55 && (sc.t?.macdHist ?? 0) > 0).length;
  const hot = rows.filter(sc => (sc.t?.rsi ?? 0) >= 70 || (sc.t?.trend6m ?? 0) >= 45).length;
  const weak = rows.filter(sc => (sc.t?.rsi ?? 50) < 45 || (sc.t?.macdHist ?? 0) < 0).length;
  const strongPct = strong / rows.length;
  const hotPct = hot / rows.length;
  const weakPct = weak / rows.length;
  let label = '中性';
  let note = '多空訊號混合';
  let score = 0;
  if(strongPct >= 0.45 && hotPct < 0.25){ label = '偏多'; note = '強勢股比例高，尚未全面過熱'; score = 2; }
  else if(hotPct >= 0.3){ label = '過熱'; note = '不少股票漲幅或RSI偏高，短線追價要保守'; score = -1; }
  else if(weakPct >= 0.45){ label = '偏弱'; note = '弱勢股票比例偏高，短線勝率較差'; score = -2; }
  return { label, score, note, strong, hot, weak, total:rows.length };
}

function getSectorMood(sc){
  const sector = sc.sector || sc.industry || '';
  const rows = Object.values(allScores || {}).filter(x => (x.sector || x.industry || '') === sector);
  if(!sector || rows.length < 2) return { label:'未知', note:'同族群樣本不足' };
  const avgRsi = rows.reduce((s,x)=>s+(x.t?.rsi ?? 50),0) / rows.length;
  const strong = rows.filter(x => (x.t?.macdHist ?? 0) > 0 && (x.t?.rsi ?? 0) >= 55).length;
  const hot = rows.filter(x => (x.t?.rsi ?? 0) >= 70 || (x.t?.trend6m ?? 0) >= 45).length;
  const label = hot / rows.length >= 0.35 ? '族群過熱' : strong / rows.length >= 0.4 ? '族群轉強' : avgRsi < 45 ? '族群偏弱' : '族群中性';
  return { label, note:`${sector}：${strong}/${rows.length} 檔偏強，平均RSI ${avgRsi.toFixed(1)}` };
}

function _parseDateOnly(value){
  if(!value) return null;
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return null;
  d.setHours(0,0,0,0);
  return d;
}

function getExDividendContext(sc){
  const id = sc?.id;
  const ex = id ? ghCache?.exdiv?.[id] : null;
  const div = Number(ex?.div || sc?.f?.div || 0);
  const exDate = _parseDateOnly(ex?.date);
  if(!exDate || !div) return {label:'無除息風險', note:'近期沒有可用除息資料', days:null, div};
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = Math.round((today - exDate) / (1000*60*60*24));
  const t = sc?.t || {};
  const price = Number(t.price || 0);
  const ma20 = Number(t.ma20 || 0);
  const macdHist = Number(t.macdHist || 0);
  const nearEx = days >= 0 && days <= 15;
  const beforeEx = days < 0 && days >= -7;
  const weakAfterEx = nearEx && ((ma20 && price < ma20) || macdHist < 0);
  if(beforeEx) return {label:'除息前保守', note:`${Math.abs(days)} 天後除息 ${div} 元，短線需避開除息波動`, days, div, blocker:true};
  if(weakAfterEx) return {label:'除息後待填息', note:`除息後 ${days} 天，尚未站回 MA20 或 MACD 偏弱，先等填息確認`, days, div, blocker:true};
  if(nearEx) return {label:'除息後觀察', note:`除息後 ${days} 天，需觀察是否能填息並站穩均線`, days, div, caution:true};
  return {label:'除息影響降低', note:`距離除息已 ${days} 天，除息影響下降`, days, div};
}

function getDailyChangeContext(sc){
  const rows = ghCache?.price?.[sc?.id] || [];
  const sorted = rows.filter(x => x.close != null).sort((a,b) => String(a.date).localeCompare(String(b.date)));
  if(sorted.length < 2) return {label:'缺資料', note:'缺少近兩日股價資料', stockPct:null, marketPct:null, diff:null};
  const last = Number(sorted[sorted.length - 1].close || 0);
  const prev = Number(sorted[sorted.length - 2].close || 0);
  const stockPct = prev ? (last - prev) / prev * 100 : null;
  const changes = Object.values(allScores || {}).map(x => {
    const r = ghCache?.price?.[x.id] || [];
    const s = r.filter(y => y.close != null).sort((a,b) => String(a.date).localeCompare(String(b.date)));
    if(s.length < 2) return null;
    const l = Number(s[s.length - 1].close || 0);
    const p = Number(s[s.length - 2].close || 0);
    return p ? (l - p) / p * 100 : null;
  }).filter(x => Number.isFinite(x));
  const marketPct = changes.length ? changes.reduce((a,b)=>a+b,0) / changes.length : null;
  const diff = Number.isFinite(stockPct) && Number.isFinite(marketPct) ? stockPct - marketPct : null;
  if(diff !== null && diff <= -2) return {label:'明顯弱於樣本', note:`近一日 ${stockPct.toFixed(2)}%，比樣本平均弱 ${Math.abs(diff).toFixed(2)} 個百分點`, stockPct, marketPct, diff, blocker:true};
  if(diff !== null && diff < -0.8) return {label:'偏弱', note:`近一日 ${stockPct.toFixed(2)}%，弱於樣本平均`, stockPct, marketPct, diff, caution:true};
  if(diff !== null && diff >= 1) return {label:'相對強勢', note:`近一日 ${stockPct.toFixed(2)}%，強於樣本平均`, stockPct, marketPct, diff};
  return {label:'接近大盤', note: stockPct === null ? '缺少比較資料' : `近一日 ${stockPct.toFixed(2)}%，接近樣本平均`, stockPct, marketPct, diff};
}

function getTrendRiskContext(sc){
  const t = sc?.t || {};
  const price = Number(t.price || 0);
  const ma20 = Number(t.ma20 || 0);
  const ma60 = Number(t.ma60 || 0);
  const rsi = Number(t.rsi ?? 50);
  const macdHist = Number(t.macdHist || 0);
  const blockers = [];
  const cautions = [];
  if(ma20 && price < ma20) blockers.push('跌破 MA20');
  if(ma60 && price < ma60) cautions.push('低於 MA60');
  if(macdHist < 0) blockers.push('MACD 偏弱');
  if(rsi < 45) cautions.push('RSI 偏弱');
  if(rsi > 68) cautions.push('RSI 過熱');
  const label = blockers.length ? '趨勢偏弱' : cautions.length ? '趨勢需觀察' : '趨勢正常';
  return {label, blockers, cautions, note:[...blockers, ...cautions].join('、') || '均線與動能未見明顯風險'};
}

function getAIDecisionGuard(sc, mode){
  const ex = getExDividendContext(sc);
  const rel = getDailyChangeContext(sc);
  const trend = getTrendRiskContext(sc);
  const chip = typeof getChipMood === 'function' ? getChipMood(sc) : {score:0, label:'缺資料'};
  const rules = [];
  let maxConclusion = '買進';
  if(ex.blocker){ rules.push(ex.note); maxConclusion = '觀望'; }
  if(trend.blockers.length){
    rules.push(`技術面：${trend.blockers.join('、')}`);
    maxConclusion = mode === 'short' ? '不買' : (maxConclusion === '買進' ? '觀望' : maxConclusion);
  }
  if(rel.blocker){
    rules.push(rel.note);
    maxConclusion = mode === 'short' ? '不買' : (maxConclusion === '買進' ? '觀望' : maxConclusion);
  }
  if(chip.score <= -4){
    rules.push(`籌碼偏弱：${chip.label}`);
    maxConclusion = mode === 'short' ? '不買' : (maxConclusion === '買進' ? '觀望' : maxConclusion);
  }
  if(mode === 'short' && (ex.caution || trend.cautions.length)){
    rules.push('短線仍有波動風險');
    if(maxConclusion === '買進') maxConclusion = '觀望';
  }
  return {
    maxConclusion,
    rules,
    ex,
    rel,
    trend,
    text: rules.length ? rules.join('；') : '沒有觸發硬性風控限制'
  };
}

function buildAIDataTextV2(id, sc, mode){
  const base = buildAIDataText(id, sc);
  const guard = getAIDecisionGuard(sc, mode);
  return `${base}
系統風控閘門：${guard.text}
AI 最高允許結論：${guard.maxConclusion}
除息/填息：${guard.ex.label}，${guard.ex.note}
相對強弱：${guard.rel.label}，${guard.rel.note}
趨勢風險：${guard.trend.label}，${guard.trend.note}
`;
}

const _loadLiveInstOriginal = loadLiveInst;
loadLiveInst = async function(id){
  const box = document.getElementById('instLiveContent');
  const btn = document.getElementById('btnInstLive');
  if(btn) btn.disabled = true;
  if(box) box.innerHTML = '<div class="spinner" style="margin-right:8px; display:inline-block; vertical-align:middle"></div> <span style="vertical-align:middle">更新法人籌碼中...</span>';
  try{
    const start=new Date(Date.now()-30*24*60*60*1000).toISOString().slice(0,10);
    const r=await fetch(`${PROXY}/api/finmind/${id}?token=${FINMIND_TOKEN}&start_date=${start}`);
    if(!r.ok) throw new Error();
    const d=await r.json();
    if(d.status!==200||!d.data?.length) throw new Error();
    const allDates=[...new Set(d.data.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
    const latest=allDates[0];
    const last5Dates=allDates.slice(0,5);
    function sumByDates(dates){
      const rows=d.data.filter(x=>dates.includes(x.date));
      let f=0,t=0,dealer=0;
      for(const row of rows){
        const net=(row.buy||0)-(row.sell||0);
        const n=row.name;
        if(n==='Foreign_Investor'||n==='Foreign_Dealer_Self')f+=net;
        else if(n==='Investment_Trust')t+=net;
        else if(String(n).includes('Dealer'))dealer+=net;
      }
      return {foreign:Math.round(f/1000),trust:Math.round(t/1000),dealer:Math.round(dealer/1000),total:Math.round((f+t+dealer)/1000)};
    }
    const todayData=sumByDates([latest]);
    const trend5d=sumByDates(last5Dates);
    let consecutiveBuyDays=0;
    for(const dt of last5Dates){if(sumByDates([dt]).total>0)consecutiveBuyDays++; else break;}
    let consecutiveSellDays=0;
    for(const dt of last5Dates){if(sumByDates([dt]).total<0)consecutiveSellDays++; else break;}
    const inst = {...todayData, date:latest, total5d:trend5d.total, consecutiveBuyDays, consecutiveSellDays};
    if(allScores[id]) allScores[id].instData = inst;
    renderInstitutionalBox(id, inst, false);
  }catch(e){
    if(box) box.innerHTML = '<span style="color:var(--red)">無法更新法人籌碼，已保留快取資料。</span>';
  }finally{
    if(btn) btn.disabled = false;
  }
};

function getChaseRiskContext(sc){
  const rel = typeof getDailyChangeContext === 'function' ? getDailyChangeContext(sc) : {stockPct:null};
  const t = sc?.t || {};
  const price = Number(t.price || 0);
  const ma20 = Number(t.ma20 || 0);
  const rsi = Number(t.rsi ?? 50);
  const pos52 = Number(t.pos52 ?? 50);
  const stockPct = Number(rel.stockPct);
  const notes = [];
  let blocker = false;
  let caution = false;
  if(Number.isFinite(stockPct) && stockPct >= 5){
    blocker = true;
    notes.push(`單日急漲 ${stockPct.toFixed(2)}%，短線不追高`);
  }else if(Number.isFinite(stockPct) && stockPct >= 3){
    caution = true;
    notes.push(`單日上漲 ${stockPct.toFixed(2)}%，需等拉回`);
  }
  if(ma20 && price > ma20 * 1.08){
    caution = true;
    notes.push('距 MA20 偏遠');
  }
  if(pos52 >= 75 && rsi >= 60){
    caution = true;
    notes.push('接近高位且 RSI 偏熱');
  }
  return {
    blocker,
    caution,
    label: blocker ? '追高風險高' : caution ? '追高需觀察' : '追高風險低',
    note: notes.join('；') || '沒有明顯追高風險',
    stockPct
  };
}

const _getAIDecisionGuardBeforeChase = getAIDecisionGuard;
getAIDecisionGuard = function(sc, mode){
  const guard = _getAIDecisionGuardBeforeChase(sc, mode);
  const chase = getChaseRiskContext(sc);
  guard.chase = chase;
  if(mode === 'short' && chase.blocker){
    guard.rules.push(chase.note);
    guard.maxConclusion = '觀望';
    guard.text = guard.rules.length ? guard.rules.join('；') : guard.text;
  }else if(mode === 'short' && chase.caution && guard.maxConclusion === '買進'){
    guard.rules.push(chase.note);
    guard.maxConclusion = '觀望';
    guard.text = guard.rules.length ? guard.rules.join('；') : guard.text;
  }
  return guard;
};

          return`<tr onclick="showDetail('${sc.id}')">
            <td class="td-mono" style="color:var(--muted)">#${rank || i+1}</td>
            <td><b class="td-mono" style="color:var(--accent2)">${sc.id}</b> <span style="color:var(--text)">${sc.name}</span></td>

            <td>${tags}</td>

};
function getPracticalTradeDecision(sc, mode='long'){
  const f = sc?.f || {};
  const t = sc?.t || {};
  const v = sc?.vDetail || {};
  const chip = typeof getChipMood === 'function' ? getChipMood(sc) : {score:0, label:'缺資料', reasons:[]};
  const ex = typeof getExDividendContext === 'function' ? getExDividendContext(sc) : {blocker:false, caution:false, label:'無除息風險', note:''};
  const rel = typeof getDailyChangeContext === 'function' ? getDailyChangeContext(sc) : {blocker:false, caution:false, label:'缺資料', note:''};
  const trend = typeof getTrendRiskContext === 'function' ? getTrendRiskContext(sc) : {blockers:[], cautions:[], label:'缺資料', note:''};
  const chase = typeof getChaseRiskContext === 'function' ? getChaseRiskContext(sc) : {blocker:false, caution:false, label:'追高風險低', note:''};
  const news = typeof getNewsMood === 'function' ? getNewsMood(sc) : {label:'待更新', note:''};

  let opportunity = 0;
  let risk = 0;
  const reasons = [];
  const risks = [];

  if((sc.fScore || 0) >= 35){ opportunity += 2; reasons.push('基本面強'); }
  else if((sc.fScore || 0) >= 28){ opportunity += 1; reasons.push('基本面尚可'); }
  else { risk += 1; risks.push('基本面不足'); }

  if((sc.vScore || 0) >= 10){ opportunity += 2; reasons.push('估值合理'); }
  else if((sc.vScore || 0) >= 6){ opportunity += 1; reasons.push('估值可接受'); }
  else { risk += 1; risks.push('估值吸引力低'); }

  if((sc.tScore || 0) >= 42){ opportunity += 2; reasons.push('技術面強'); }
  else if((sc.tScore || 0) >= 34){ opportunity += 1; reasons.push('技術面轉強'); }
  else { risk += 1; risks.push('技術面不足'); }

  if((t.macdHist || 0) > 0){ opportunity += 1; reasons.push('MACD轉正'); }
  else { risk += mode === 'short' ? 2 : 1; risks.push('MACD偏弱'); }

  if(t.ma20 && t.price >= t.ma20){ opportunity += 1; reasons.push('站上MA20'); }
  else if(t.ma20){ risk += mode === 'short' ? 2 : 1; risks.push('跌破MA20'); }

  if((t.rsi ?? 50) >= 50 && (t.rsi ?? 50) <= 65){ opportunity += 1; reasons.push('RSI健康'); }
  else if((t.rsi ?? 50) > 72){ risk += 2; risks.push('RSI過熱'); }
  else if((t.rsi ?? 50) < 45){ risk += 1; risks.push('RSI偏弱'); }

  if((t.volRatio || 1) >= 1.05 && (t.volRatio || 1) <= 2.4){ opportunity += 1; reasons.push('量能支持'); }
  else if((t.volRatio || 1) > 3){ risk += 1; risks.push('爆量需防震盪'); }

  if(chip.score >= 3){ opportunity += 2; reasons.push('法人支持'); }
  else if(chip.score >= 1){ opportunity += 1; reasons.push('籌碼偏多'); }
  else if(chip.score <= -4){ risk += 2; risks.push('法人偏賣'); }
  else if(chip.score < 0){ risk += 1; risks.push('籌碼偏弱'); }

  if(String(news.label || '').includes('偏多')){ opportunity += 1; reasons.push('題材偏多'); }
  if(String(news.label || '').includes('偏空')){ risk += 1; risks.push('新聞偏空'); }

  if(chase.blocker){ risk += 2; risks.push(chase.note); }
  else if(chase.caution){ risk += 1; risks.push(chase.note); }
  if(ex.blocker){ risk += 2; risks.push(ex.note); }
  else if(ex.caution){ risk += 1; risks.push(ex.note); }
  if(rel.blocker){ risk += 2; risks.push(rel.note); }
  else if(rel.caution){ risk += 1; risks.push(rel.note); }
  if(trend.blockers?.length){ risk += mode === 'short' ? 2 : 1; risks.push(trend.blockers.join('、')); }

  let action = '觀望';
  let position = '0%';
  if(mode === 'short'){
    if(opportunity >= 9 && risk <= 2){ action = '積極買進'; position = '60-70%'; }
    else if(opportunity >= 7 && risk <= 3){ action = '買進'; position = '40-50%'; }
    else if(opportunity >= 6 && risk <= 5){ action = '小量試單'; position = '20-30%'; }
    else if(opportunity <= 4 || risk >= 7){ action = '不買'; position = '0%'; }
  }else{
    if(opportunity >= 8 && risk <= 2){ action = '積極買進'; position = '60-70%'; }
    else if(opportunity >= 6 && risk <= 4){ action = '買進'; position = '40-50%'; }
    else if(opportunity >= 5 && risk <= 6){ action = '小量試單'; position = '20-30%'; }
    else if(opportunity <= 4 || risk >= 8){ action = '不買'; position = '0%'; }
  }

  let buyType = '等待型';
  if(action !== '觀望' && action !== '不買'){
    if(ex.label?.includes('除息') && !ex.blocker) buyType = '填息型';
    else if(t.ma20 && t.price >= t.ma20 && (t.macdHist || 0) > 0 && chase.caution) buyType = '突破小量型';
    else if(t.ma20 && t.price >= t.ma20 && (t.rsi ?? 50) <= 62) buyType = '順勢型';
    else if(t.ma20 && t.price < t.ma20 && chip.score >= 2) buyType = '低接型';
    else buyType = '試單型';
  }

  return {
    action, position, buyType, opportunity, risk,
    reasons: reasons.slice(0,4),
    risks: risks.slice(0,4),
    summary: `機會${opportunity} / 風險${risk}，${action}，建議部位${position}`,
    contexts:{chip, ex, rel, trend, chase, news}
  };
}

function getShortWeaknessContextUltimate(sc){
  const t = sc?.t || {};
  const num = (v, fallback=0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
  const price = num(t.price);
  const ma5 = num(t.ma5);
  const ma20 = num(t.ma20);
  const downStreak = num(t.downStreak ?? t.down_streak);
  const last3Return = num(t.last3Return ?? t.last_3_return);
  const ma5Gap = num(t.ma5Gap ?? t.ma5_gap, ma5 > 0 ? ((price - ma5) / ma5) * 100 : 0);
  const macdHist = num(t.macdHist ?? t.macd_hist);
  const macdHistDelta = num(t.macdHistDelta ?? t.macd_hist_delta);
  const volRatio = num(t.volRatio ?? t.vol_ratio_5_20, 1);
  const lastVolumeRatio20 = num(t.lastVolumeRatio20 ?? t.last_volume_ratio_20, volRatio);
  const rsi = num(t.rsi ?? t.rsi14, 50);
  const blockers = [];
  const cautions = [];

  if(downStreak >= 3) blockers.push('連跌3天');
  else if(downStreak >= 2) cautions.push('連跌2天');
  if(ma5 > 0 && price > 0 && price < ma5){
    if(downStreak >= 2 || ma5Gap <= -1) blockers.push('跌破MA5');
    else cautions.push('低於MA5');
  }
  if(ma20 > 0 && price > 0 && price < ma20 && downStreak >= 2) blockers.push('跌破MA20');
  if(macdHist <= 0 && downStreak >= 2) blockers.push('MACD轉弱');
  else if(macdHist > 0 && macdHistDelta < 0) cautions.push('MACD動能縮小');
  if(last3Return <= -3) blockers.push('3日跌幅過大');
  else if(last3Return < -1.5) cautions.push('3日轉弱');
  if((volRatio < 0.8 || lastVolumeRatio20 < 0.75) && downStreak >= 2) blockers.push('量縮下跌');
  else if(volRatio < 0.9 || lastVolumeRatio20 < 0.85) cautions.push('量能不足');
  if(rsi >= 70 && macdHistDelta < 0) cautions.push('RSI偏熱且動能降溫');

  return {
    blocker: blockers.length > 0,
    caution: cautions.length > 0,
    blockers,
    cautions,
    downStreak,
    last3Return,
    ma5Gap,
    macdHistDelta,
    volRatio,
    lastVolumeRatio20,
    label: blockers.length ? '短線轉弱' : (cautions.length ? '短線需確認' : '短線健康'),
    note: [...blockers, ...cautions].join('、') || '未出現明顯轉弱訊號'
  };
}

getShortWeaknessContext = getShortWeaknessContextUltimate;

var __getPracticalTradeDecisionUltimate = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const decision = __getPracticalTradeDecisionUltimate(sc, mode);
  if(mode !== 'short') return decision;
  const weak = getShortWeaknessContext(sc);
  decision.contexts = decision.contexts || {};
  decision.contexts.shortWeakness = weak;
  decision.shortWeakness = weak;
  if(weak.blocker){
    decision.action = '不買';
    decision.position = '0%';
    decision.buyType = '轉弱排除';
    decision.risk = (decision.risk || 0) + 3;
    decision.risks = [...weak.blockers, ...(decision.risks || [])].slice(0, 5);
    decision.summary = `短線轉弱：${weak.note}，不列入短線買進`;
    return decision;
  }
  if(weak.caution){
    decision.risk = (decision.risk || 0) + 1;
    decision.risks = [...weak.cautions, ...(decision.risks || [])].slice(0, 5);
    if(String(decision.action).includes('積極') || decision.position === '60-70%'){
      decision.action = '小量試單';
      decision.position = '20-30%';
      decision.buyType = '等確認';
      decision.summary = `短線需確認：${weak.note}，只適合小量觀察`;
    }
  }
  return decision;
};

function getLatestPriceDateForStock(sc){
  const rows = ghCache?.price?.[sc?.id] || [];
  const dates = rows.map(x => x?.date).filter(Boolean).sort();
  return dates.length ? dates[dates.length - 1] : null;
}

function getDataFreshnessContext(sc){
  const latest = getLatestPriceDateForStock(sc);
  if(!latest) return {stale:true, label:'資料待確認', note:'缺少股價日期'};
  const latestDate = new Date(`${latest}T00:00:00+08:00`);
  const today = new Date();
  today.setHours(0,0,0,0);
  const ageDays = Math.round((today - latestDate) / 86400000);
  const stale = ageDays > 3;
  return {
    stale,
    latest,
    ageDays,
    label: stale ? '資料偏舊' : '資料正常',
    note: stale ? `股價資料停在 ${latest}，距今 ${ageDays} 天，盤中變化可能尚未反映` : `股價資料日期 ${latest}`
  };
}

function normalizeBuyActionText(action){
  const text = String(action || '');
  if(text.includes('不買') || text.includes('銝')) return '不買';
  if(text.includes('觀望') || text.includes('閫')) return '觀望';
  if(text.includes('積極') || text.includes('蝛')) return '積極買進';
  if(text.includes('小量') || text.includes('撠')) return '小量試單';
  if(text.includes('買進') || text.includes('鞎')) return '買進';
  return text || '觀望';
}

var __getPracticalTradeDecisionFreshnessGuard = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const decision = __getPracticalTradeDecisionFreshnessGuard(sc, mode);
  const freshness = getDataFreshnessContext(sc);
  const weak = typeof getShortWeaknessContext === 'function'
    ? getShortWeaknessContext(sc)
    : {blocker:false, caution:false, label:'短線未檢查', note:''};
  decision.contexts = decision.contexts || {};
  decision.contexts.freshness = freshness;

  if(mode === 'long'){
    const action = normalizeBuyActionText(decision.action);
    if(weak.blocker){
      decision.action = '觀望';
      decision.position = '0%';
      decision.buyType = '等轉強';
      decision.risk = (decision.risk || 0) + 2;
      decision.risks = [...(weak.blockers || ['短線轉弱']), ...(decision.risks || [])].slice(0,5);
      decision.summary = `短線轉弱：${weak.note}，中長線先觀望`;
      return decision;
    }
    if(freshness.stale && action === '積極買進'){
      decision.action = '買進';
      decision.position = '30-40%';
      decision.buyType = '等盤中確認';
      decision.risk = (decision.risk || 0) + 1;
      decision.risks = [freshness.note, ...(decision.risks || [])].slice(0,5);
      decision.summary = `資料偏舊，積極買進降級為買進：${freshness.note}`;
      return decision;
    }
    if(weak.caution && action === '積極買進'){
      decision.action = '買進';
      decision.position = '30-40%';
      decision.buyType = '等回穩';
      decision.risk = (decision.risk || 0) + 1;
      decision.risks = [...(weak.cautions || ['短線需確認']), ...(decision.risks || [])].slice(0,5);
      decision.summary = `短線需確認，積極買進降級為買進：${weak.note}`;
    }
  }
  return decision;
};

function isBuyableActionForTop5(action){
  const clean = normalizeBuyActionText(action);
  return clean === '積極買進' || clean === '買進' || clean === '小量試單';
}

function getShortWeaknessContextStrict(sc){
  const t = sc?.t || {};
  const num = (v, fallback=0) => Number.isFinite(Number(v)) ? Number(v) : fallback;
  const price = num(t.price);
  const ma5 = num(t.ma5);
  const ma20 = num(t.ma20);
  const downStreak = num(t.downStreak ?? t.down_streak);
  const last3Return = num(t.last3Return ?? t.last_3_return);
  const ma5Gap = num(t.ma5Gap ?? t.ma5_gap, ma5 > 0 ? ((price - ma5) / ma5) * 100 : 0);
  const macdHist = num(t.macdHist ?? t.macd_hist);
  const macdHistDelta = num(t.macdHistDelta ?? t.macd_hist_delta);
  const volRatio = num(t.volRatio ?? t.vol_ratio_5_20, 1);
  const lastVolumeRatio20 = num(t.lastVolumeRatio20 ?? t.last_volume_ratio_20, volRatio);
  const rsi = num(t.rsi ?? t.rsi14, 50);
  const freshness = typeof getDataFreshnessContext === 'function'
    ? getDataFreshnessContext(sc)
    : {stale:false, label:'資料正常', note:''};
  const blockers = [];
  const cautions = [];

  if(freshness.stale) blockers.push('短線資料偏舊');
  if(downStreak >= 3) blockers.push('連跌3天');
  else if(downStreak >= 2) cautions.push('連跌2天');
  if(ma5 > 0 && price > 0 && price < ma5){
    if(downStreak >= 2 || ma5Gap <= -1) blockers.push('跌破MA5');
    else cautions.push('低於MA5');
  }
  if(ma20 > 0 && price > 0 && price < ma20 && downStreak >= 2) blockers.push('跌破MA20');
  if(macdHist <= 0 && downStreak >= 2) blockers.push('MACD轉弱');
  else if(macdHist > 0 && macdHistDelta < 0) cautions.push('MACD動能縮小');
  if(last3Return <= -3) blockers.push('3日跌幅過大');
  else if(last3Return < -1.5) cautions.push('3日轉弱');
  if((volRatio < 0.8 || lastVolumeRatio20 < 0.75) && downStreak >= 2) blockers.push('量縮下跌');
  else if(volRatio < 0.9 || lastVolumeRatio20 < 0.85) cautions.push('量能不足');
  if(rsi >= 70 && macdHistDelta < 0) cautions.push('RSI偏熱且動能降溫');

  return {
    blocker: blockers.length > 0,
    caution: cautions.length > 0,
    blockers,
    cautions,
    freshness,
    downStreak,
    last3Return,
    ma5Gap,
    macdHistDelta,
    volRatio,
    lastVolumeRatio20,
    label: blockers.length ? '短線排除' : (cautions.length ? '短線需確認' : '短線健康'),
    note: [...blockers, ...cautions].join('、') || '未出現明顯轉弱訊號'
  };
}

getShortWeaknessContext = getShortWeaknessContextStrict;

var __getPracticalTradeDecisionStrictShort = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const decision = __getPracticalTradeDecisionStrictShort(sc, mode);
  if(mode !== 'short') return decision;
  const weak = getShortWeaknessContext(sc);
  decision.contexts = decision.contexts || {};
  decision.contexts.shortWeakness = weak;
  decision.contexts.freshness = weak.freshness;
  decision.shortWeakness = weak;

  if(weak.blocker){
    decision.action = '不買';
    decision.position = '0%';
    decision.buyType = '短線排除';
    decision.risk = Math.max((decision.risk || 0) + 3, 8);
    decision.risks = [...weak.blockers, ...(decision.risks || [])].slice(0, 5);
    decision.summary = `短線排除：${weak.note}`;
    return decision;
  }
  if(weak.caution && normalizeBuyActionText(decision.action) === '積極買進'){
    decision.action = '小量試單';
    decision.position = '20-30%';
    decision.buyType = '等確認';
    decision.risk = (decision.risk || 0) + 1;
    decision.risks = [...weak.cautions, ...(decision.risks || [])].slice(0, 5);
    decision.summary = `短線需確認：${weak.note}`;
  }
  return decision;
};

// Market-regime and entry-timing overlay. Core stock scores remain unchanged.
function getMarketRegimeContext(){
  const rows = Object.values(allScores || {});
  const valid = rows.filter(sc => {
    const t = sc?.t || {};
    return Number(t.price) > 0 && Number(t.ma20) > 0;
  });
  if(valid.length < 50){
    return {
      label:'資料不足', level:'unknown', score:0,
      note:`只有 ${valid.length} 支具備完整技術資料，盤勢暫以中性處理`,
      total:valid.length, aboveMa20Pct:0, macdPositivePct:0, downPct:0, hotPct:0
    };
  }

  const ratio = predicate => valid.filter(predicate).length / valid.length;
  const aboveMa20Pct = ratio(sc => Number(sc.t?.price) >= Number(sc.t?.ma20));
  const macdPositivePct = ratio(sc => Number(sc.t?.macdHist ?? sc.t?.macd_hist) > 0);
  const downPct = ratio(sc => Number(sc.t?.downStreak ?? sc.t?.down_streak ?? 0) >= 2);
  const hotPct = ratio(sc => Number(sc.t?.rsi ?? sc.t?.rsi14 ?? 50) >= 70);
  const healthyPct = ratio(sc => {
    const t = sc.t || {};
    const rsi = Number(t.rsi ?? t.rsi14 ?? 50);
    return Number(t.price) >= Number(t.ma20) &&
      Number(t.macdHist ?? t.macd_hist) > 0 && rsi >= 48 && rsi <= 68;
  });

  let label = '震盪';
  let level = 'sideways';
  let score = 0;
  if(aboveMa20Pct >= 0.58 && macdPositivePct >= 0.52 && downPct < 0.25){
    label = '偏多'; level = 'bullish'; score = 1;
  }else if(aboveMa20Pct < 0.43 || macdPositivePct < 0.40 || downPct >= 0.35){
    label = '偏弱'; level = 'weak'; score = -1;
  }else if(hotPct >= 0.30 && healthyPct < 0.40){
    label = '過熱震盪'; level = 'hot'; score = -1;
  }

  const pct = value => `${Math.round(value * 100)}%`;
  return {
    label, level, score, total:valid.length,
    aboveMa20Pct, macdPositivePct, downPct, hotPct, healthyPct,
    note:`站上MA20 ${pct(aboveMa20Pct)}、MACD正值 ${pct(macdPositivePct)}、連跌股 ${pct(downPct)}`
  };
}

// Keep the existing mood panels and AI data source aligned with the same market regime.
getMarketMood = function(){
  const market = getMarketRegimeContext();
  return {
    ...market,
    strong:Math.round((market.healthyPct || 0) * (market.total || 0)),
    hot:Math.round((market.hotPct || 0) * (market.total || 0)),
    weak:Math.round((market.downPct || 0) * (market.total || 0))
  };
};

function getEntryTimingContext(sc){
  const t = sc?.t || {};
  const num = (value, fallback=0) => Number.isFinite(Number(value)) ? Number(value) : fallback;
  const weak = getShortWeaknessContext(sc);
  const freshness = weak.freshness || getDataFreshnessContext(sc);
  const price = num(t.price);
  const ma5 = num(t.ma5);
  const ma20 = num(t.ma20);
  const macdHist = num(t.macdHist ?? t.macd_hist);
  const macdHistDelta = num(t.macdHistDelta ?? t.macd_hist_delta);
  const downStreak = num(t.downStreak ?? t.down_streak);
  const last3Return = num(t.last3Return ?? t.last_3_return);
  const rsi = num(t.rsi ?? t.rsi14, 50);
  const checks = [];

  if(weak.blocker){
    return {
      level:'blocked', label:'短線排除', ready:false, blocker:true,
      note:weak.blockers.join('、') || '短線結構轉弱', freshness, weak
    };
  }

  if(!(ma5 > 0 && price >= ma5)) checks.push('尚未站穩MA5');
  if(!(ma20 > 0 && price >= ma20)) checks.push('尚未站穩MA20');
  if(macdHist <= 0) checks.push('MACD未轉正');
  if(macdHistDelta < 0) checks.push('MACD動能縮小');
  if(downStreak > 0) checks.push('最近仍有下跌');
  if(last3Return <= 0) checks.push('近3日未轉強');
  if(rsi < 48 || rsi > 68) checks.push('RSI不在健康區');
  if(freshness?.stale) checks.push('資料偏舊');

  const ready = checks.length === 0;
  return {
    level:ready ? 'ready' : 'confirm',
    label:ready ? '條件完成' : '盤中確認',
    ready,
    blocker:false,
    note:ready ? '日線條件完整；實際下單前仍確認盤中未轉弱' : checks.slice(0,3).join('、'),
    freshness,
    weak
  };
}

function lowerTradeAction(action){
  const clean = normalizeBuyActionText(action);
  if(clean === '積極買進') return '買進';
  if(clean === '買進') return '小量試單';
  return clean;
}

var __getPracticalTradeDecisionBeforeMarketTiming = getPracticalTradeDecision;
getPracticalTradeDecision = function(sc, mode='long'){
  const decision = __getPracticalTradeDecisionBeforeMarketTiming(sc, mode);
  const market = getMarketRegimeContext();
  const timing = getEntryTimingContext(sc);
  let action = normalizeBuyActionText(decision.action);

  decision.contexts = decision.contexts || {};
  decision.contexts.marketRegime = market;
  decision.contexts.entryTiming = timing;
  decision.marketRegime = market;
  decision.entryTiming = timing;

  if(timing.blocker){
    decision.action = mode === 'short' ? '不買' : '觀望';
    decision.position = '0%';
    decision.buyType = '等轉強';
    decision.risks = [timing.note, ...(decision.risks || [])].slice(0,5);
    decision.summary = `${timing.label}：${timing.note}`;
    return decision;
  }

  // A sideways market lowers only aggressive calls. A weak market lowers every buy call once.
  if(market.level === 'weak') action = lowerTradeAction(action);
  else if((market.level === 'sideways' || market.level === 'hot') && action === '積極買進') action = '買進';

  // An incomplete daily setup needs one more confirmation, but remains a candidate.
  if(!timing.ready && (action === '積極買進' || action === '買進')) action = lowerTradeAction(action);

  decision.action = action;
  if(action === '積極買進') decision.position = mode === 'short' ? '30-40%' : '40-50%';
  else if(action === '買進') decision.position = '30-40%';
  else if(action === '小量試單') decision.position = market.level === 'weak' ? '10-20%' : '20-30%';
  else decision.position = '0%';

  if(['積極買進','買進','小量試單'].includes(action)){
    decision.buyType = timing.ready ? '盤中未轉弱可進場' : '等盤中確認';
  }
  const marketRisk = market.level === 'weak' || market.level === 'hot' ? `盤勢${market.label}：${market.note}` : '';
  const timingRisk = timing.ready ? '' : timing.note;
  decision.risks = [marketRisk, timingRisk, ...(decision.risks || [])].filter(Boolean).slice(0,5);
  decision.risk = (decision.risk || 0) + (market.level === 'weak' || market.level === 'hot' ? 1 : 0) + (!timing.ready ? 1 : 0);
  decision.summary = `${action}，${decision.position}；盤勢${market.label}，${timing.label}`;
  return decision;
};

// Realtime execution overlay: cache selects candidates; intraday quotes decide entry timing.
const liveQuoteState = {stocks:{}, market:null, updatedAt:'', source:'', loading:false, error:''};

async function loadRealtimeQuotes(stockIds){
  const ids = [...new Set((stockIds || []).map(String).filter(Boolean))].slice(0,25);
  if(!ids.length) return liveQuoteState;
  liveQuoteState.loading = true;
  liveQuoteState.error = '';
  try{
    const response = await fetch(`${PROXY}/api/realtime-quotes`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({stock_ids:ids})
    });
    const data = await response.json().catch(()=>({}));
    if(!response.ok || !data.success) throw new Error(data.detail || `HTTP ${response.status}`);
    ids.forEach(id=>delete liveQuoteState.stocks[id]);
    liveQuoteState.stocks = {...liveQuoteState.stocks, ...(data.stocks || {})};
    liveQuoteState.market = data.market || null;
    liveQuoteState.updatedAt = data.updated_at || new Date().toISOString();
    liveQuoteState.source = data.source || '';
  }catch(error){
    liveQuoteState.error = error?.message || '盤中報價載入失敗';
    ids.forEach(id=>delete liveQuoteState.stocks[id]);
    liveQuoteState.market = null;
  }finally{
    liveQuoteState.loading = false;
  }
  return liveQuoteState;
}

function getCacheSelectionDecision(sc, mode='long'){
  const source = typeof __getPracticalTradeDecisionBeforeMarketTiming === 'function'
    ? __getPracticalTradeDecisionBeforeMarketTiming
    : getPracticalTradeDecision;
  return source(sc, mode);
}

function isExecutableAction(action){
  return ['積極買進','買進','小量試單'].includes(normalizeBuyActionText(action));
}

function getRealtimeExecutionContext(sc){
  const quote = liveQuoteState.stocks?.[sc?.id] || null;
  const market = liveQuoteState.market || null;
  const invalidReason = !quote
    ? (liveQuoteState.error || '尚未取得這支股票的盤中報價')
    : !market
      ? '尚未取得同一時間的大盤報價'
      : quote.valid_for_trading !== true
        ? (quote.stale_reason || '個股報價不是今天的資料')
        : market.valid_for_trading !== true
          ? (market.stale_reason || '大盤報價不是今天的資料')
          : quote.quote_date !== market.quote_date
            ? `個股日期 ${quote.quote_date || '未知'} 與大盤日期 ${market.quote_date || '未知'} 不一致`
            : '';
  if(invalidReason){
    return {
      available:false, label:'盤中資料未通過驗證', note:invalidReason,
      quote, market, changePct:null, marketPct:null, relativePct:null, dayPosition:null
    };
  }
  const changePct = Number(quote.change_pct);
  const marketPct = Number(market?.change_pct);
  if(!Number.isFinite(changePct) || !Number.isFinite(marketPct)){
    return {
      available:false, label:'盤中資料未通過驗證', note:'個股或大盤漲跌幅格式錯誤',
      quote, market, changePct:null, marketPct:null, relativePct:null, dayPosition:null
    };
  }
  const relativePct = Number.isFinite(changePct) && Number.isFinite(marketPct) ? changePct - marketPct : null;
  const high = Number(quote.high);
  const low = Number(quote.low);
  const price = Number(quote.price);
  const dayPosition = high > low ? (price - low) / (high - low) : 0.5;
  return {
    available:true, label:'盤中報價已更新', quote, market,
    changePct, marketPct:Number.isFinite(marketPct) ? marketPct : null,
    relativePct, dayPosition,
    note:`個股 ${changePct.toFixed(2)}%，大盤 ${marketPct.toFixed(2)}%，相對 ${relativePct.toFixed(2)}%（${quote.source || 'TWSE MIS'} ${quote.quote_date} ${quote.quote_time}${quote.price_kind && quote.price_kind !== '成交價' ? `，${quote.price_kind}` : ''}）`
  };
}

function applyRealtimeExecutionDecision(sc, mode, baseDecision){
  const decision = {...baseDecision, contexts:{...(baseDecision.contexts || {})}};
  const live = getRealtimeExecutionContext(sc);
  decision.contexts.realtime = live;
  decision.realtime = live;
  let action = normalizeBuyActionText(decision.action);

  if(!live.available){
    action = '觀望';
    decision.action = action;
    decision.position = '0%';
    decision.buyType = '盤中資料未驗證';
    decision.risks = [live.note, ...(decision.risks || [])].slice(0,5);
    decision.summary = `${action}；盤中行情未通過日期與來源驗證`;
    return decision;
  }

  const change = live.changePct;
  const relative = live.relativePct;
  const dayPosition = live.dayPosition;
  let liveLabel = '跟隨大盤';
  let liveReason = live.note;

  if(change >= 9 || (change >= 7.5 && dayPosition >= 0.90)){
    action = '觀望';
    liveLabel = '漲停或急漲不追價';
    liveReason = `盤中已上漲 ${change.toFixed(2)}%，追價風險高`;
  }else if(change >= 5 && dayPosition >= 0.85){
    action = '觀望';
    liveLabel = '等拉回';
    liveReason = `漲幅 ${change.toFixed(2)}% 且接近日高，等拉回再判斷`;
  }else if(change <= -2 || (Number.isFinite(relative) && relative <= -2)){
    action = mode === 'short' ? '不買' : '觀望';
    liveLabel = '明顯轉弱';
    liveReason = change <= -2 ? `盤中下跌 ${Math.abs(change).toFixed(2)}%` : `落後大盤 ${Math.abs(relative).toFixed(2)} 個百分點`;
  }else if(Number.isFinite(relative) && relative <= -0.8){
    action = mode === 'short' ? '不買' : '觀望';
    liveLabel = '弱於大盤';
    liveReason = `落後大盤 ${Math.abs(relative).toFixed(2)} 個百分點`;
  }else if(isExecutableAction(action)){
    if(Number.isFinite(relative) && relative >= 1 && change >= 0.5){
      action = '買進';
      liveLabel = '相對強勢';
      liveReason = `上漲 ${change.toFixed(2)}%，領先大盤 ${relative.toFixed(2)} 個百分點`;
    }else if(change > 0 && (!Number.isFinite(relative) || relative >= 0)){
      action = '小量試單';
      liveLabel = '略強於大盤';
      liveReason = Number.isFinite(relative) ? `領先大盤 ${relative.toFixed(2)} 個百分點` : `盤中上漲 ${change.toFixed(2)}%`;
    }else{
      action = '觀望';
      liveLabel = '尚未轉強';
      liveReason = Number.isFinite(relative) ? `目前落後大盤 ${Math.abs(relative).toFixed(2)} 個百分點` : '盤中漲勢尚未確認';
    }
  }

  decision.action = action;
  decision.position = action === '買進' ? '30-40%' : action === '小量試單' ? '10-20%' : '0%';
  decision.buyType = liveLabel;
  decision.risks = [liveReason, ...(decision.risks || [])].slice(0,5);
  decision.summary = `${action}，${decision.position}；${liveLabel}：${liveReason}`;
  decision.liveLabel = liveLabel;
  decision.liveReason = liveReason;
  return decision;
}

getPracticalTradeDecision = function(sc, mode='long'){
  return applyRealtimeExecutionDecision(sc, mode, getCacheSelectionDecision(sc, mode));
};

function getRealtimeCandidatePool(mode){
  return Object.values(allScores).map(sc => {
    const base = getCacheSelectionDecision(sc, mode);
    if(!isExecutableAction(base.action)) return null;
    const quality = (base.opportunity || 0) * (mode === 'short' ? 14 : 12) -
      (base.risk || 0) * 6 + (sc.total || 0) * 0.25 + (mode === 'short' ? Math.min(sc.tScore || 0,50) * 0.35 : 0);
    return {...sc, cacheDecision:base, cacheQuality:quality};
  }).filter(Boolean).sort((a,b)=>b.cacheQuality-a.cacheQuality).slice(0,20);
}

function realtimeRankScore(sc, decision, mode){
  const live = decision.realtime || {};
  const relative = Number.isFinite(live.relativePct) ? live.relativePct : -1;
  const change = Number.isFinite(live.changePct) ? live.changePct : 0;
  const strengthBonus = Math.max(-3, Math.min(relative, 3)) * 12 + Math.max(0, Math.min(change, 4)) * 2;
  const confirmationBonus = decision.liveLabel === '相對強勢' ? 12 : decision.liveLabel === '略強於大盤' ? 5 : 0;
  return sc.cacheQuality + strengthBonus + confirmationBonus + (mode === 'short' ? relative * 3 : 0);
}
