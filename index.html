<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股中長期選股儀表板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0e1a; color: #e5e7eb; min-height: 100vh; }
        .header { background: #111827; border-bottom: 1px solid #1e2d45; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 20px; font-weight: 700; color: #00d4aa; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .api-key-input { background: #1a2235; border: 1px solid #1e2d45; color: #e5e7eb; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 220px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #00d4aa; color: #000; }
        .btn-secondary { background: #1a2235; color: #e5e7eb; border: 1px solid #1e2d45; }
        .layout { display: flex; min-height: calc(100vh - 65px); }
        .sidebar { width: 280px; background: #111827; border-right: 1px solid #1e2d45; padding: 20px; overflow-y: auto; }
        .sidebar-label { font-size: 12px; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; }
        .filter-input { width: 100%; background: #1a2235; border: 1px solid #1e2d45; color: #e5e7eb; padding: 8px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
        .stock-list { list-style: none; }
        .stock-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .stock-item:hover { background: #1a2235; }
        .stock-id { font-weight: 600; font-family: monospace; }
        .stock-name { font-size: 12px; color: #6b7280; }
        .grade-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; background: #1a2235; }
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }
        .welcome { text-align: center; padding: 80px 20px; }
        .welcome h2 { font-size: 28px; margin-bottom: 16px; color: #00d4aa; }
        .panel { background: #111827; border: 1px solid #1e2d45; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #00d4aa; }
        .metric-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e2d45; }
        .metric-label { color: #6b7280; font-size: 14px; }
        .metric-value { font-family: monospace; font-weight: 600; }
        .score-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .score-card { background: #111827; border: 1px solid #1e2d45; border-radius: 8px; padding: 20px; text-align: center; }
        .score-value { font-size: 32px; font-weight: 700; font-family: monospace; margin-bottom: 4px; color: #00d4aa; }
        .score-label { font-size: 12px; color: #6b7280; text-transform: uppercase; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #111827; border: 1px solid #00d4aa; border-radius: 8px; padding: 16px 24px; z-index: 1000; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">台股選股儀表板</div>
        <div class="header-right">
            <input class="api-key-input" id="apiKeyInput" type="password" placeholder="NVIDIA API Key (AI分析用)">
            <button class="btn btn-primary" onclick="loadStocks()">載入前100大</button>
            <button class="btn btn-secondary" onclick="runScreener()">篩選優質股</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-label">股票清單 <span id="stockCount">(0)</span></div>
            <ul class="stock-list" id="stockList">
                <li style="color: #6b7280; text-align: center; padding: 20px;">請點擊「載入前100大」</li>
            </ul>
        </div>

        <div class="main-content">
            <div class="welcome" id="welcome">
                <h2>台股中長期選股儀表板</h2>
                <p>請點擊左上角「載入前100大」開始</p>
            </div>
            <div id="stockDetail" style="display:none;"></div>
            <div id="screenerResult" style="display:none;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 🔥 關鍵修復：指定後端 API 的絕對路徑，解決 GitHub Pages 的 404 問題
        const API_BASE = 'https://twstock-app.onrender.com';
        
        let allStocks = [];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function loadStocks() {
            showToast('正在載入股票清單...');
            try {
                // 🔥 使用 API_BASE 絕對路徑
                const r = await fetch(`${API_BASE}/api/top50`);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                if (!data.success) throw new Error(data.detail);
                
                allStocks = data.data;
                document.getElementById('stockCount').textContent = `(${allStocks.length})`;
                renderStockList();
                showToast(`✅ 已載入 ${allStocks.length} 支股票`);
                
                // 觸發批次評分
                fetch(`${API_BASE}/api/batch-score`, { method: 'POST' });
            } catch (e) {
                showToast('❌ 載入失敗：' + e.message);
                console.error(e);
            }
        }

        function renderStockList() {
            const list = document.getElementById('stockList');
            list.innerHTML = allStocks.map(s => `
                <li class="stock-item" onclick="loadStockDetail('${s.stock_id}', '${s.name}')">
                    <div>
                        <div class="stock-id">${s.stock_id}</div>
                        <div class="stock-name">${s.name}</div>
                    </div>
                </li>
            `).join('');
        }

        async function loadStockDetail(stockId, stockName) {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('screenerResult').style.display = 'none';
            const detail = document.getElementById('stockDetail');
            detail.style.display = 'block';
            detail.innerHTML = '<div style="text-align:center; padding:40px; color: #6b7280;">載入中...</div>';
            
            try {
                const r = await fetch(`${API_BASE}/api/stock/${stockId}/score`);
                const data = await r.json();
                if (!data.success) throw new Error(data.detail);
                
                const sc = data.data;
                const f = sc.fundamental || {};
                const t = sc.technical || {};
                const v = sc.valuation || {};
                
                detail.innerHTML = `
                    <h1 style="margin-bottom: 20px;">${stockId} ${stockName} <span class="grade-badge">${sc.grade || '-'}</span></h1>
                    
                    <div class="score-overview">
                        <div class="score-card"><div class="score-value">${sc.total_score}</div><div class="score-label">總分 /100</div></div>
                        <div class="score-card"><div class="score-value">${sc.fundamental_score}</div><div class="score-label">基本面 /40</div></div>
                        <div class="score-card"><div class="score-value">${sc.technical_score}</div><div class="score-label">技術面 /35</div></div>
                        <div class="score-card"><div class="score-value">${sc.valuation_score}</div><div class="score-label">估值面 /15</div></div>
                        <div class="score-card"><div class="score-value">${sc.upside_score || 0}</div><div class="score-label">獲利空間 /10</div></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-title">基本面指標</div>
                        <div class="metric-row"><span class="metric-label">EPS</span><span class="metric-value">${f.eps ?? 'N/A'}</span></div>
                        <div class="metric-row"><span class="metric-label">ROE</span><span class="metric-value">${f.roe ?? 'N/A'}%</span></div>
                        <div class="metric-row"><span class="metric-label">營收年增率</span><span class="metric-value">${f.revenue_yoy ?? 'N/A'}%</span></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-title">技術面指標</div>
                        <div class="metric-row"><span class="metric-label">股價</span><span class="metric-value">${t.current_price ?? 'N/A'}</span></div>
                        <div class="metric-row"><span class="metric-label">RSI14</span><span class="metric-value">${t.rsi14 ?? 'N/A'}</span></div>
                        <div class="metric-row"><span class="metric-label">MACD Hist</span><span class="metric-value">${t.macd_hist ?? 'N/A'}</span></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-title">估值面指標</div>
                        <div class="metric-row"><span class="metric-label">本益比 PE</span><span class="metric-value">${v.pe ?? 'N/A'}</span></div>
                        <div class="metric-row"><span class="metric-label">殖利率</span><span class="metric-value">${v.div_yield ?? 'N/A'}%</span></div>
                    </div>
                `;
            } catch (e) {
                detail.innerHTML = `<div style="color: #ef4444; text-align: center; padding: 40px;">載入失敗：${e.message}</div>`;
            }
        }

        async function runScreener() {
            const container = document.getElementById('screenerResult');
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('stockDetail').style.display = 'none';
            container.style.display = 'block';
            container.innerHTML = '<div style="text-align:center; padding:40px;">篩選中...</div>';
            
            try {
                const r = await fetch(`${API_BASE}/api/screener?min_score=60`);
                const data = await r.json();
                if (!data.success) throw new Error(data.detail);
                
                container.innerHTML = `
                    <div class="panel">
                        <div class="panel-title">篩選結果 (評分 >= 60，共 ${data.count} 支)</div>
                        ${data.data.map(sc => `
                            <div class="metric-row" style="cursor:pointer;" onclick="loadStockDetail('${sc.stock_id}', '')">
                                <span class="metric-label">${sc.stock_id}</span>
                                <span class="metric-value">總分: ${sc.total_score} (${sc.grade})</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `<div style="color: #ef4444; text-align: center; padding: 40px;">篩選失敗：${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
