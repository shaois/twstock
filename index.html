<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股中長期選股儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;--accent:#00d4aa;--accent2:#3b82f6;--warn:#f59e0b;--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;}
header{background:linear-gradient(135deg,#0d1b2e,#0a0e1a);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.api-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;width:220px;}
.api-input:focus{outline:none;border-color:var(--accent);}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all .15s;}
.btn-primary{background:var(--accent);color:#000;}.btn-primary:hover{background:#00bfa0;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 57px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:8px 16px 4px;}
.filter-wrap{padding:4px 12px 8px;}
.filter-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;}
.stock-item{padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent;transition:all .12s;}
.stock-item:hover{background:var(--surface2);}.stock-item.active{background:rgba(0,212,170,.08);border-left-color:var(--accent);}
.s-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent2);}
.s-name{font-size:11px;color:var(--muted);}
.grade-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.gAp{background:rgba(0,255,204,.25);color:#00ffcc;}.gA{background:rgba(34,197,94,.2);color:#22c55e;}
.gB{background:rgba(0,212,170,.2);color:var(--accent);}.gC{background:rgba(245,158,11,.2);color:var(--warn);}
.gD{background:rgba(239,68,68,.2);color:var(--red);}
.main{overflow-y:auto;padding:20px;background:var(--bg);}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:14px;color:var(--muted);}
.welcome h2{font-size:20px;color:var(--text);font-weight:500;}
.step-cards{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;width:150px;text-align:center;}
.step-num{font-size:26px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.step-text{font-size:11px;line-height:1.6;}
#progressBar{position:fixed;top:57px;left:0;right:0;z-index:200;background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 18px;display:none;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
#progressBar.show{display:flex;}
.stock-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.stock-title h1{font-size:24px;font-weight:700;}
.stock-title .sub{color:var(--muted);font-size:13px;margin-top:2px;}
.score-overview{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.score-card .val{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;}
.score-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.panel-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.metric-row:last-child{border-bottom:none;}
.metric-name{color:var(--muted);font-size:12px;}
.metric-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.metric-score{font-size:10px;padding:1px 5px;background:rgba(0,212,170,.15);color:var(--accent);border-radius:3px;margin-left:5px;}
.bar-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.bar-label{width:90px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;}
.bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-val{width:28px;text-align:right;font-size:11px;font-family:'JetBrains Mono',monospace;}
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;}
.ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ai-badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 7px;background:rgba(59,130,246,.2);color:var(--accent2);border-radius:4px;}
.ai-content{line-height:1.9;color:var(--text);font-size:13px;white-space:pre-wrap;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:10px 0;}
.spinner{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.inst-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.inst-card{background:var(--surface2);border-radius:8px;padding:10px;text-align:center;}
.inst-lbl{font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.inst-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;}
.screener-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;padding:7px 10px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
tbody tr{cursor:pointer;transition:background .1s;}tbody tr:hover{background:var(--surface2);}
tbody td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);}
.td-mono{font-family:'JetBrains Mono',monospace;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;display:none;align-items:center;gap:8px;z-index:999;}
.toast.show{display:flex;}
.disclaimer{font-size:11px;color:var(--muted);text-align:center;padding-bottom:20px;}
@media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.score-overview{grid-template-columns:repeat(2,1fr);}.detail-grid{grid-template-columns:1fr;}}
</style>
</head>

const GH_CACHE_BASE = "https://raw.githubusercontent.com/shaois/twstock/main/cache";

async function loadGitHubCache(){
  if(ghCache.loaded)return ghCache;
  try{

      fetch(`${GH_CACHE_BASE}/fundamental.json?t=${Date.now()}`).then(x=>x.ok?x.json():null).catch(()=>null),

      fetch(`${GH_CACHE_BASE}/price.json?t=${Date.now()}`).then(x=>x.ok?x.json():null).catch(()=>null),
    ]);
    ghCache.fundamental = f?.data || {};
    ghCache.revenue = r?.data || {};

    ghCache.savedAt = f?._saved_at || null;

}

// ── FinMind 基本面自動抓取 ──────────────────────────────────────
const fmFundamentalCache={};
async function fetchFinMindFundamental(stockId){
  if(fmFundamentalCache[stockId])return fmFundamentalCache[stockId];

  // 優先使用 GitHub 每日快取
  await loadGitHubCache();
  let fsData=null, revData=null;
  if(ghCache.fundamental?.[stockId]||ghCache.revenue?.[stockId]){
    if(ghCache.fundamental[stockId])fsData={status:200,data:ghCache.fundamental[stockId]};
    if(ghCache.revenue[stockId])revData={status:200,data:ghCache.revenue[stockId]};
    console.log(`[GH Cache] ${stockId} 使用每日快取資料`);
  }

  try{
    if(!fsData||!revData){
      const [fsRes,revRes]=await Promise.all([
        fetch(`${PROXY}/api/finmind/fundamental/${stockId}?token=${FINMIND_TOKEN}`),
        fetch(`${PROXY}/api/finmind/revenue/${stockId}?token=${FINMIND_TOKEN}`)
      ]);
      // 402 = FinMind Token 超過免費額度，直接回 null，保留靜態資料
      if(fsRes.status===402||revRes.status===402){
        console.warn(`[FinMind 402] ${stockId} Token超量，使用靜態資料`);
        return null;
      }
      fsData=await fsRes.json();
      revData=await revRes.json();
    }
    let eps=0;
    if(fsData.status===200&&fsData.data?.length){
      const epsRows=fsData.data.filter(r=>r.type==='EPS').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
      eps=Math.round(epsRows.reduce((s,r)=>s+(r.value||0),0)*100)/100;
    }
    let roe=0;
    if(fsData.status===200&&fsData.data?.length){
      const roeRow=fsData.data.filter(r=>r.type==='ROE').sort((a,b)=>b.date.localeCompare(a.date))[0];
      if(roeRow){
        let roeVal=roeRow.value||0;
        // FinMind ROE 有時是小數格式(0.285)有時是百分比(28.5)
        // 絕對值 < 2 且非0 視為小數，乘100轉換
        if(Math.abs(roeVal)<2&&roeVal!==0)roeVal=roeVal*100;
        roe=Math.round(roeVal*100)/100;
      }
    }
    let yoy=0;
    if(revData.status===200&&revData.data?.length){
      const revRows=revData.data.sort((a,b)=>b.date.localeCompare(a.date));
      if(revRows.length>=13){
        // 足夠資料：當月 vs 去年同月 YoY
        const thisMonth=revRows[0].revenue||0;
        const lastYear=revRows[12].revenue||0;
        yoy=lastYear>0?Math.round((thisMonth-lastYear)/lastYear*1000)/10:0;
      } else if(revRows.length>=2){
        // 資料不足13筆：用最近3個月平均 vs 再前3個月平均，估算趨勢
        const recent=revRows.slice(0,3).reduce((s,r)=>s+(r.revenue||0),0)/Math.min(3,revRows.length);
        const prev=revRows.slice(3,6).reduce((s,r)=>s+(r.revenue||0),0)/Math.min(3,Math.max(0,revRows.length-3));
        yoy=prev>0?Math.round((recent-prev)/prev*1000)/10:0;
      }
    }
    // 品質防呆：eps/roe 同時為0代表API沒回有效資料，保留靜態
    const lowConfidence=(eps===0&&roe===0);
    const result={eps,roe,yoy,auto:true,lowConfidence};
    fmFundamentalCache[stockId]=result;
    return result;
  }catch(e){return null;}
}

    }else{
      const start=new Date(Date.now()-270*24*60*60*1000).toISOString().slice(0,10);
      const url=`${PROXY}/api/finmind/price/${stockId}?token=${FINMIND_TOKEN}&start_date=${start}`;
      const r=await fetch(url);
      // 402 = Token超量，不 fallback Yahoo（避免大量 404），直接回 null
      if(r.status===402){console.warn(`[FinMind Price 402] ${stockId} Token超量`);return null;}
      if(!r.ok)return null;
      const d=await r.json();
      if(d.status!==200||!d.data?.length)return null;
      rows=d.data.filter(x=>x.close!=null).sort((a,b)=>a.date.localeCompare(b.date));
    }
    const closes=rows.map(x=>x.close);
    const volumes=rows.map(x=>x.Trading_Volume||0);
    const price=closes[closes.length-1]||0;
    const high52=Math.max(...closes);
    const low52=Math.min(...closes);
    const result={closes,volumes,price,high52,low52,source:'finmind'};
    fmPriceCache[stockId]=result;
    return result;
  }catch(e){return null;}
}

// ── FinMind Institutional ─────────────────────────────────────
async function fetchInstitutional(stockId){
  if(instCache[stockId])return instCache[stockId];
  try{
    const today=new Date();
    const startDate=new Date(today-30*24*60*60*1000).toISOString().slice(0,10);
    const url=`${PROXY}/api/finmind/${stockId}?token=${FINMIND_TOKEN}&start_date=${startDate}`;
    const r=await fetch(url);if(!r.ok)return null;
    const d=await r.json();
    if(d.status!==200||!d.data?.length)return null;
    const latest=d.data[d.data.length-1].date;
    const rows=d.data.filter(x=>x.date===latest);
    let foreign=0,trust=0,dealer=0;
    for(const row of rows){
      const net=(row.buy||0)-(row.sell||0);
      const n=row.name;
      if(n==='Foreign_Investor')foreign+=net;
      else if(n==='Investment_Trust')trust+=net;
      else if(n==='Dealer_Self'||n==='Dealer_self'||n==='Dealer_Hedging')dealer+=net;
    }
    const result={foreign:Math.round(foreign/1000),trust:Math.round(trust/1000),dealer:Math.round(dealer/1000),total:Math.round((foreign+trust+dealer)/1000),date:latest};
    instCache[stockId]=result;return result;
  }catch(e){return null;}
}

// ── Technical Indicators ──────────────────────────────────────
function calcRSI(closes,p=14){
  if(closes.length<p+1)return 50;
  let gains=[],losses=[];
  for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1];gains.push(Math.max(d,0));losses.push(Math.max(-d,0));}
  const ag=gains.slice(-p).reduce((a,b)=>a+b)/p;const al=losses.slice(-p).reduce((a,b)=>a+b)/p;
  if(al===0)return 100;return 100-(100/(1+ag/al));
}
function calcEMA(data,p){const k=2/(p+1);let ema=[data[0]];for(let i=1;i<data.length;i++)ema.push(data[i]*k+ema[i-1]*(1-k));return ema;}
function calcMACD(closes){if(closes.length<26)return{macd:0,signal:0,hist:0};const e12=calcEMA(closes,12),e26=calcEMA(closes,26);const ml=e12.map((v,i)=>v-e26[i]);const sig=calcEMA(ml,9);return{macd:ml[ml.length-1],signal:sig[sig.length-1],hist:ml[ml.length-1]-sig[sig.length-1]};}
function avg(arr,n){const a=arr.slice(-n);return a.reduce((s,v)=>s+v,0)/a.length;}

// ── Scoring ───────────────────────────────────────────────────
function scoreStock(id,ydata){
  const f={eps:0,roe:0,yoy:0,div:0,...(FUNDAMENTAL[id]||{})};
  const stock=STOCK_LIST.find(s=>s.id===id)||{sector:"其他",name:id};
  const sector=stock.sector;
  const closes=ydata?.closes||[];const volumes=ydata?.volumes||[];
  const price=ydata?.price||0;
  const high52=ydata?.high52||Math.max(...(closes.length?closes:[0]))||price;
  const low52=ydata?.low52||Math.min(...(closes.length?closes:[0]))||price;
  let t={price,high52,low52,ma5:0,ma20:0,ma60:0,ma120:0,rsi:50,macd:0,macdHist:0,volRatio:1,trend6m:0,pos52:50};
  if(closes.length>=5){
    t.ma5=avg(closes,5);t.ma20=avg(closes,Math.min(20,closes.length));
    t.ma60=avg(closes,Math.min(60,closes.length));t.ma120=avg(closes,Math.min(120,closes.length));
    t.rsi=calcRSI(closes);const m=calcMACD(closes);t.macd=m.macd;t.macdHist=m.hist;
    const v5=avg(volumes,Math.min(5,volumes.length)),v20=avg(volumes,Math.min(20,volumes.length));
    t.volRatio=v20>0?v5/v20:1;
    t.pos52=high52!==low52?(price-low52)/(high52-low52)*100:50;
    if(closes.length>=120)t.trend6m=(price-closes[closes.length-121])/closes[closes.length-121]*100;
  }
  // 【平衡模式】基本面 35分：防雷為主，確保獲利能力
  let fScore=0,fDetail={};
  // EPS 10分：有獲利才有支撐，虧損股重扣
  const epsS=f.eps<=0?0:Math.min(Math.max(f.eps/10*10,1),10);fScore+=epsS;fDetail.eps=epsS;
  // ROE 10分：資本效率，>=15%得滿分
  const roeS=Math.min(Math.max(f.roe/20*10,0),10);fScore+=roeS;fDetail.roe=roeS;
  // 營收年增率 10分：半年內成長動能支撐股價
  const yoyS=f.yoy>0?Math.min(f.yoy/20*10,10):0;fScore+=yoyS;fDetail.yoy=yoyS;
  // 殖利率 5分：半年持有配息意義不大，低權重
  const divYield=price>0&&f.div>0?f.div/price*100:0;
  const divS=Math.min(divYield/5*5,5);fScore+=divS;fDetail.div=divS;fDetail.divYield=divYield;
  // 【平衡模式】技術面 65分：確認中期趨勢方向
  let tScore=0,tDetail={};
  // 均線多頭 25分：MA20>MA60>MA120 是半年趨勢最可靠訊號
  let maS=0;if(price>0&&t.ma5>0){
    if(price>t.ma20)maS+=8;       // 股價站上月線
    if(t.ma20>t.ma60)maS+=9;      // 月線>季線：中期趨勢向上
    if(t.ma60>t.ma120&&t.ma120>0)maS+=8; // 季線>半年線：長趨勢確認
  }
  tScore+=maS;tDetail.ma=maS;
  // RSI 20分：40~65 是半年布局最佳區間（不過熱不過冷）
  // RSI 漸進式評分（滿分20，無硬切邊界）
  // 最佳區間 40~65，往兩端平滑遞減
  let rsiS;
  const rsi=t.rsi;
  if(rsi>=40&&rsi<=65){
    // 40~65 核心區：以 52.5 為最高點，兩側平滑遞減，最低得 14 分
    rsiS=20-Math.abs(rsi-52.5)/12.5*6;
  }else if(rsi>65&&rsi<=80){
    // 65~80 偏熱：從 14 線性降到 3
    rsiS=14-(rsi-65)/15*11;
  }else if(rsi>80){
    // >80 嚴重過熱
    rsiS=2;
  }else if(rsi>=35&&rsi<40){
    // 35~40 偏弱：從 12 降到 8
    rsiS=12-(40-rsi)/5*4;
  }else{
    // <35 趨勢可能已壞
    rsiS=2;
  }
  rsiS=Math.round(Math.max(2,Math.min(20,rsiS))*10)/10;
  tScore+=rsiS;tDetail.rsi=rsiS;
  // MACD 12分：動能方向確認
  let macdS=0;if(t.macd>0)macdS+=6;if(t.macdHist>0)macdS+=6;tScore+=macdS;tDetail.macd=macdS;
  // 成交量 8分：有量才有持續上漲動能
  const volS=t.volRatio>=1.5?8:t.volRatio>=1.3?6:t.volRatio>=1?4:t.volRatio>=0.7?2:0;tScore+=volS;tDetail.vol=volS;
  // 6M趨勢 5分
  const trendS=t.trend6m>=20?5:t.trend6m>=10?4:t.trend6m>=0?3:t.trend6m>=-10?1:0;
  tScore+=trendS;tDetail.trend=trendS;
  // 估值面 20分：避免追高，確保有安全邊際
  const pe=price>0&&f.eps>0?price/f.eps:null;
  const avgPE=SECTOR_PE[sector]||18;const peVs=pe?Math.round((pe/avgPE-1)*100):null;
  let vScore=0,vDetail={pe,avgPE,peVs,divYield:fDetail.divYield};
  // PE vs 產業均值 12分：低於均值代表還有上漲空間
  let peS=0;if(pe!==null){if(peVs<=-30)peS=12;else if(peVs<=-10)peS=10;else if(peVs<=10)peS=7;else if(peVs<=30)peS=3;else peS=0;}
  vScore+=peS;vDetail.peScore=peS;
  // 殖利率 8分：提高權重，配息提供持有期間保護
  const dyS=divYield>=5?8:divYield>=3.5?6:divYield>=2?4:divYield>=1?2:0;vScore+=dyS;vDetail.dyScore=dyS;
  const total=Math.round((fScore+tScore+vScore)*10)/10;
  // 【平衡模式】總分120，A+需要基本面+技術面雙強
  const grade=total>=95?"A+":total>=80?"A":total>=65?"B":total>=50?"C":"D";
  const suggestion=total>=95?"強烈建議布局（半年）":total>=80?"建議買進觀察":total>=65?"值得追蹤":total>=50?"中性觀望":"暫不建議";
  return{id,name:stock.name,sector,total,fScore:Math.round(fScore*10)/10,tScore:Math.round(tScore*10)/10,vScore:Math.round(vScore*10)/10,grade,suggestion,f,t,fDetail,tDetail,vDetail};
}

async function loadStocks(){
  showToast('開始抓取即時股價，計算市值排序…');
  const candidates=STOCK_LIST;
  const total=candidates.length;
  showProgress(0,total,'抓取股價');

  const priceMap={};
  // 平行抓取，每批10支
  for(let i=0;i<total;i+=10){
    const batch=candidates.slice(i,i+10);
    await Promise.all(batch.map(async s=>{
      const y=await fetchStockData(s.id);
      priceMap[s.id]=y?.price||0;
      if(y)fmPriceCache[s.id]=y;
    }));
    showProgress(Math.min(i+10,total),total,'抓取股價');
  }

  // 計算市值（股價 × 發行股數），排序取前100
  const withCap=candidates.map(s=>({
    ...s,
    price: priceMap[s.id]||0,
    priceFailed: !priceMap[s.id],
    marketCap: (priceMap[s.id]||0) * (s.shares||0)
  }));
  const withPrice=withCap.filter(s=>s.price>0).sort((a,b)=>b.marketCap-a.marketCap);
  const noPrice=withCap.filter(s=>s.price===0).sort((a,b)=>(b.shares||0)-(a.shares||0));
  allStocks=[...withPrice,...noPrice].slice(0,100);

  document.getElementById('stockCount').textContent=`(${allStocks.length})`;
  showToast(`✓ 市值排序完成，前${allStocks.length}大已載入，開始評分…`);

  // 逐支評分
  showProgress(0,allStocks.length,'評分');
  for(let i=0;i<allStocks.length;i++){
    const s=allStocks[i];
    try{
      const ydata=fmPriceCache[s.id]||await fetchStockData(s.id);
      // 自動抓 FinMind 基本面，更新靜態資料
      const fmF=await fetchFinMindFundamental(s.id);
      if(fmF&&!fmF.lowConfidence){
        if(!FUNDAMENTAL[s.id])FUNDAMENTAL[s.id]={};
        // eps/roe 有實際值才覆蓋靜態資料（lowConfidence=true 時整段跳過，保留靜態）
        if(fmF.eps!=null&&fmF.eps!==0)FUNDAMENTAL[s.id].eps=fmF.eps;
        if(fmF.roe!=null&&fmF.roe!==0)FUNDAMENTAL[s.id].roe=fmF.roe;
        if(fmF.yoy!=null)FUNDAMENTAL[s.id].yoy=fmF.yoy;
        // Debug log（前20支都印，方便比對FinMind資料品質）
        console.log(`[FM] ${s.id} ${s.name} eps:${fmF.eps} roe:${fmF.roe} yoy:${fmF.yoy} lowConf:${fmF.lowConfidence}`);
      } else if(fmF?.lowConfidence){
        // FinMind沒拿到有效eps/roe（可能是402超量），整段保留靜態資料
        // yoy=0 視為無效（402回傳空值），不覆蓋靜態的負值
        if(!FUNDAMENTAL[s.id])FUNDAMENTAL[s.id]={};
        if(fmF.yoy!=null&&fmF.yoy!==0)FUNDAMENTAL[s.id].yoy=fmF.yoy;
        console.log(`[FM-LC] ${s.id} ${s.name} 低信心(可能402)，yoy${fmF.yoy!==0?'更新:'+fmF.yoy:'=0跳過，保留靜態:'+FUNDAMENTAL[s.id]?.yoy}`);
      } else {
        console.log(`[FM-NULL] ${s.id} ${s.name} FinMind無回傳，使用靜態資料`);
      }
      // 基本面確定後才算分（避免用到舊靜態資料）
      allScores[s.id]=scoreStock(s.id,ydata);
      // 每支都印最終分數，方便比對
      console.log(`[SCORE] ${s.id} ${s.name} 總:${allScores[s.id]?.total} 基本:${allScores[s.id]?.fScore} 技術:${allScores[s.id]?.tScore} 估值:${allScores[s.id]?.vScore} | eps:${FUNDAMENTAL[s.id]?.eps} roe:${FUNDAMENTAL[s.id]?.roe} yoy:${FUNDAMENTAL[s.id]?.yoy}`);
      // 基本面更新後，若目前正在看這支股票，靜默更新分數卡（不重建DOM，避免法人閃掉）
      if(currentStock===s.id){
        const sc2=allScores[s.id];
        const el=document.getElementById('scoreTotal');if(el)el.textContent=sc2.total;
        const ef=document.getElementById('scoreFund');if(ef)ef.textContent=sc2.fScore;
        const et=document.getElementById('scoreTech');if(et)et.textContent=sc2.tScore;
        const ev=document.getElementById('scoreVal');if(ev)ev.textContent=sc2.vScore;
      }
    }catch(e){allScores[s.id]=scoreStock(s.id,null);}
    showProgress(i+1,allStocks.length,'評分');
    renderStockList();
    await new Promise(r=>setTimeout(r,150));
  }
  hideProgress();
  showToast(`✓ 完成！前${allStocks.length}大依市值排序，評分完畢`);
}

function renderStockList(){
  const minScore=parseInt(document.getElementById('filterScore').value)||0;
  const sector=document.getElementById('filterSector').value;
  const filtered=allStocks.filter(s=>{
    const sc=allScores[s.id];
    if(sc&&sc.total<minScore)return false;
    if(sector&&s.sector!==sector)return false;
    return true;
  }).sort((a,b)=>(allScores[b.id]?.total||0)-(allScores[a.id]?.total||0));

  // Show market cap rank in sidebar
  document.getElementById('stockList').innerHTML=filtered.map((s,i)=>{
    const sc=allScores[s.id];const g=sc?.grade||'—';const score=sc?sc.total:'—';
    const rank=allStocks.findIndex(x=>x.id===s.id)+1;
    return`<div class="stock-item ${currentStock===s.id?'active':''}" onclick="showDetail('${s.id}')">
      <div>

    content.textContent=d.choices[0].message.content;
    showToast(`✓ AI分析完成（${d.usage?.completion_tokens||0} tokens）`);
  }catch(e){content.innerHTML=`<span style="color:var(--red)">❌ ${e.message}</span>`;}
}

// ── Screener ──────────────────────────────────────────────────
function runScreener(){
  if(Object.keys(allScores).length===0){showToast('❌ 請先載入前100大');return;}
  document.getElementById('welcome').style.display='none';
  document.getElementById('stockDetail').style.display='none';
  const container=document.getElementById('screenerResult');container.style.display='block';
  const results=Object.values(allScores).filter(sc=>sc.total>=60).sort((a,b)=>b.total-a.total);
  if(!results.length){container.innerHTML='<div style="padding:20px;color:var(--muted)">尚無評分≥60的標的</div>';return;}
  const gc={'A+':'#00ffcc',A:'var(--green)',B:'var(--accent)',C:'var(--warn)',D:'var(--red)'};
  container.innerHTML=`
    <div class="screener-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="panel-title" style="margin:0">篩選結果 — 評分 ≥ 60（共 ${results.length} 支）</div>
      </div>
      <table>
        <thead><tr><th>市值排名</th><th>股票</th><th>評級</th><th>總分</th><th>基本面</th><th>技術面</th><th>估值面</th><th>RSI14</th><th>PE</th><th>殖利率</th><th>建議</th></tr></thead>
        <tbody>${results.map(sc=>{
          const rsi=sc.t.rsi;
          const rsiColor=rsi>=80?'var(--red)':rsi>=70?'#f97316':rsi>=50?'var(--green)':rsi>=30?'var(--accent)':'#818cf8';
          const rsiTag=rsi>=80?'極熱':rsi>=70?'過熱':rsi>=50?'偏多':rsi>=30?'偏弱':'超賣';
          const rank=allStocks.findIndex(x=>x.id===sc.id)+1;
          return`<tr onclick="showDetail('${sc.id}')">
            <td class="td-mono" style="color:var(--muted)">#${rank}</td>
            <td><b class="td-mono" style="color:var(--accent2)">${sc.id}</b> <span style="color:var(--muted)">${sc.name}</span></td>
            <td><span class="grade-badge g${sc.grade.replace('+','p')}">${sc.grade}</span></td>
            <td class="td-mono" style="color:${gc[sc.grade]||'var(--text)'}">${sc.total}</td>
            <td class="td-mono">${sc.fScore}</td><td class="td-mono">${sc.tScore}</td><td class="td-mono">${sc.vScore}</td>
            <td class="td-mono"><span style="color:${rsiColor};font-weight:700">${rsi.toFixed(1)}</span> <span style="font-size:10px;color:${rsiColor}">${rsiTag}</span></td>
            <td class="td-mono">${sc.vDetail.pe?sc.vDetail.pe.toFixed(1)+'x':'—'}</td>
            <td class="td-mono">${sc.vDetail.divYield.toFixed(2)}%</td>
            <td style="font-size:11px">${sc.suggestion}</td>
          </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
  showToast(`✓ 找到 ${results.length} 支優質標的`);
}
</script>
</body>
</html>
